  let html='<div class="files-wrap">';
  html+='<div class="files-section-title">Links</div>';
  if(links.length)links.forEach(f=>html+=fileItemHTML(f,curProject));
  else html+='<div style="font-size:12.5px;color:var(--text3);padding:6px 0 2px">Noch keine Links.</div>';
  html+='<div class="files-section-title">Hochgeladene Dateien</div>';
  if(uploads.length)uploads.forEach(f=>html+=fileItemHTML(f,curProject));
  else html+='<div style="font-size:12.5px;color:var(--text3);padding:6px 0 2px">Noch keine Dateien.</div>';
  html+='<div class="files-add-row"><button class="files-upload-btn" onclick="openFileModal(\''+curProject+'\')"><svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Hinzufügen</button></div>';
  html+='</div>';area.innerHTML=html;attachListeners();
}

function fileItemHTML(f,pid){
  const ICONS={
    link:'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8 2H3a1 1 0 00-1 1v8a1 1 0 001 1h8a1 1 0 001-1V6M10 1h3v3M6 8l7-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    upload:'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8 1H3a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V6L8 1z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 1v5h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'
  };
  const ICONCLASS={link:'link',upload:'file'};
  const sub={link:f.url,path:f.path||f.url,upload:f.filename+(f.data?' · gespeichert':'')}[f.type]||'';
  let actionBtn='';
  if(f.type==='link') actionBtn='<button class="file-open-btn" onclick="window.open(\''+esc(f.url)+'\',\'_blank\')">Öffnen</button>';
  else if(f.type==='path') actionBtn='<button class="file-open-btn" onclick="window.open(\''+esc(f.url||'')+'\',\'_blank\')">Öffnen</button>';
  else if(f.type==='upload') actionBtn='<button class="file-open-btn file-dl-btn" data-fid="'+f.id+'" data-pid="'+pid+'" data-filename="'+esc(f.filename)+'">Herunterladen</button>';
  return '<div class="file-item"><div class="file-icon '+(ICONCLASS[f.type]||'link')+'">'+(ICONS[f.type]||ICONS.link)+'</div><div class="file-info"><div class="file-name">'+esc(f.title)+'</div><div class="file-sub">'+esc(sub)+'</div></div><div class="file-actions">'+actionBtn+'<button class="file-del-btn" onclick="delFile(\''+pid+'\',\''+f.id+'\')">&#x2715;</button></div></div>';
}

function formatSize(b){if(b<1024)return b+'B';if(b<1024*1024)return (b/1024).toFixed(1)+'KB';return (b/1024/1024).toFixed(1)+'MB';}
async function delFile(pid,fid){const ok=await dialog('Eintrag löschen','Wirklich entfernen?','Entfernen');if(!ok)return;state.files[pid]=(state.files[pid]||[]).filter(f=>f.id!==fid);save();renderContent();}

// ── IMAGE PASTE ──
function handlePaste(e,noteCard){
  const items=e.clipboardData?.items;if(!items)return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const file=item.getAsFile(),reader=new FileReader();
      reader.onload=ev=>{
        const pid=noteCard.dataset.projectId,nid=noteCard.dataset.noteId;
        const note=(state.notes[pid]||[]).find(n=>n.id===nid);if(!note)return;
        if(!note.images)note.images=[];note.images.push(ev.target.result);save();renderContent();
      };reader.readAsDataURL(file);break;
    }
  }
}

// ── AUTO RESIZE ──
function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function autoResizeAll(){document.querySelectorAll('.note-body,.snip-code,.k-quick-inp,.add-task-desc,#task-modal-desc').forEach(autoResize);}

// ── LISTENERS ──
function attachListeners(){
  document.querySelectorAll('.note-title,.note-body').forEach(el=>{
    el.addEventListener('input',()=>{
      const card=el.closest('.note-card');
      const note=(state.notes[card.dataset.projectId]||[]).find(n=>n.id===card.dataset.noteId);
      if(note){note[el.dataset.field]=el.value;debounceSave();}
      if(el.tagName==='TEXTAREA')autoResize(el);
    });
  });
  document.querySelectorAll('.note-card').forEach(card=>{card.addEventListener('paste',e=>handlePaste(e,card));});
  document.querySelectorAll('.snip-title,.snip-code,.snip-lang').forEach(el=>{
    el.addEventListener('input',()=>{const card=el.closest('.snip-card'),snip=(state.snippets[card.dataset.projectId]||[]).find(s=>s.id===card.dataset.snippetId);if(snip){snip[el.dataset.field]=el.value;debounceSave();}if(el.tagName==='TEXTAREA')autoResize(el);});
    el.addEventListener('change',()=>{const card=el.closest('.snip-card'),snip=(state.snippets[card.dataset.projectId]||[]).find(s=>s.id===card.dataset.snippetId);if(snip){snip[el.dataset.field]=el.value;save();}});
  });
  document.querySelectorAll('.snip-code').forEach(el=>{
    el.addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const s=el.selectionStart,end=el.selectionEnd;el.value=el.value.substring(0,s)+'  '+el.value.substring(end);el.selectionStart=el.selectionEnd=s+2;el.dispatchEvent(new Event('input'));}});
  });
  document.querySelectorAll('.file-dl-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pid=btn.dataset.pid,fid=btn.dataset.fid,fname=btn.dataset.filename||'datei';
      const f=(state.files[pid]||[]).find(x=>x.id===fid);
      if(!f||!f.data){alert2('Fehler','Dateidaten nicht gefunden.');return;}
      const a=document.createElement('a');a.href=f.data;a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);
    });
  });
}

function wirePersistentListeners(){
  const taskCreateTitle=document.getElementById('task-create-title');
  if(taskCreateTitle){
    taskCreateTitle.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();confirmCreateTaskModal();}};
  }
  const taskCreateDesc=document.getElementById('task-create-desc');
  if(taskCreateDesc){
    taskCreateDesc.onkeydown=e=>{if((e.key==='Enter'&&e.ctrlKey)||(e.key==='Enter'&&e.metaKey)){e.preventDefault();confirmCreateTaskModal();}};
  }
  const taskSubtaskInp=document.getElementById('task-subtask-inp');
  if(taskSubtaskInp){
    taskSubtaskInp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();addTaskSubtask();}};
  }
  const noteCreateTitle=document.getElementById('note-create-title');
  if(noteCreateTitle){
    noteCreateTitle.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();confirmCreateNoteModal();}};
  }
  const noteCreateBody=document.getElementById('note-create-body');
  if(noteCreateBody){
    noteCreateBody.onkeydown=e=>{if((e.key==='Enter'&&e.ctrlKey)||(e.key==='Enter'&&e.metaKey)){e.preventDefault();confirmCreateNoteModal();}};
  }
}

function esc(s=''){const v=String(s??'');return v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}

wireFileModal();
wirePersistentListeners();
renderSidebar();
renderContent();
</script>
