<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIAE Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f7f5;--surface:#ffffff;--surface2:#f5f5f2;--border:#ecebe5;--border2:#ddddd4;
  --accent:#5b4fff;--accent-s:rgba(91,79,255,0.06);
  --red:#e8445a;--red-s:rgba(232,68,90,0.09);
  --green:#1b9e6e;--green-s:rgba(27,158,110,0.09);
  --amber:#d97706;--amber-s:rgba(217,119,6,0.09);
  --text:#18181f;--text2:#55556a;--text3:#9595a5;
  --shadow:0 1px 2px rgba(17,17,26,0.025),0 0 0 1px rgba(17,17,26,0.015);
  --shadow-md:0 10px 24px rgba(17,17,26,0.06),0 1px 6px rgba(17,17,26,0.03);
  --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Geist',sans-serif;min-height:100vh;display:flex;overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased;}

/* SIDEBAR */
.sidebar{width:236px;min-width:236px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
.sidebar-header{padding:18px 14px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.logo-icon{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:10px;font-weight:600;color:#fff;flex-shrink:0;}
.logo-text{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.3px;}
.logo-text span{color:var(--text3);font-weight:400;}
.sb-section{padding:12px 10px 4px;}
.sb-title{font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);font-family:'Geist Mono',monospace;padding:0 5px;margin-bottom:3px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 9px;cursor:pointer;border-radius:9px;transition:background .12s,color .12s;font-size:13px;color:var(--text2);user-select:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent-s);color:var(--accent);font-weight:500;}
.project-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.nav-count{font-size:10.5px;background:var(--surface2);color:var(--text3);padding:1px 6px;border-radius:20px;font-family:'Geist Mono',monospace;font-weight:600;}
.nav-item.active .nav-count{background:var(--accent);color:#fff;}
.nav-del{background:none;border:none;color:transparent;cursor:pointer;font-size:10px;padding:2px 4px;border-radius:4px;line-height:1;flex-shrink:0;margin-left:auto;transition:color .1s,background .1s;}
.nav-item:hover .nav-del{color:var(--text3);}
.nav-del:hover{color:var(--red)!important;background:var(--red-s);}
.sb-footer{margin-top:auto;padding:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.sb-btn{width:100%;padding:7px 10px;background:transparent;border:1.5px dashed var(--border2);border-radius:7px;color:var(--text3);font-size:12.5px;cursor:pointer;text-align:left;font-family:'Geist',sans-serif;transition:all .1s;display:flex;align-items:center;gap:7px;}
.sb-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-s);}
.ei-row{display:flex;gap:5px;}
.icon-btn{flex:1;padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text3);font-size:11.5px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .1s;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:500;}
.icon-btn:hover{background:var(--border);color:var(--text2);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh;}
.topbar{padding:0 24px;height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:rgba(255,255,255,0.82);backdrop-filter:blur(14px);flex-shrink:0;}
.proj-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;letter-spacing:-0.3px;color:var(--text);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.tab-bar{display:flex;gap:3px;background:var(--surface2);border-radius:10px;padding:3px;border:1px solid var(--border);}
.tab-btn{padding:5px 12px;border-radius:7px;border:none;background:transparent;color:var(--text3);font-size:12.5px;cursor:pointer;font-family:'Geist',sans-serif;font-weight:500;transition:all .12s;}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow);}
.tab-btn:hover:not(.active){color:var(--text2);}
.content{flex:1;overflow-y:auto;padding:24px;}

/* STATS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px 16px;box-shadow:var(--shadow);}
.stat-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-family:'Geist Mono',monospace;margin-bottom:5px;}
.stat-value{font-size:24px;font-weight:600;font-family:'Geist Mono',monospace;letter-spacing:-1px;}
.stat-value.ca{color:var(--accent);}.stat-value.cr{color:var(--red);}.stat-value.cg{color:var(--green);}
.sec-label{font-size:9.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);font-family:'Geist Mono',monospace;margin-bottom:9px;margin-top:2px;}

/* PROJECT CARDS */
.proj-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:22px;}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 14px 13px;cursor:pointer;box-shadow:var(--shadow);transition:box-shadow .16s,transform .16s,border-color .16s;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;}
.proj-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--pc-color,var(--accent));opacity:.9;}
.proj-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:var(--border2);}
.pc-header{display:flex;align-items:center;gap:8px;min-height:22px;}
.pc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pc-name{font-weight:600;font-size:13.5px;letter-spacing:-0.15px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-open-chip{font-size:10px;font-family:'Geist Mono',monospace;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:999px;white-space:nowrap;}
.pc-stats{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pc-si{display:flex;align-items:center;gap:5px;padding:0;background:transparent;border:none;border-radius:0;}
.pc-sl{font-size:10px;color:var(--text3);font-family:'Geist Mono',monospace;letter-spacing:.2px;text-transform:none;}
.pc-sv{font-size:13px;font-weight:600;font-family:'Geist Mono',monospace;letter-spacing:-0.2px;color:var(--text2);}
.pc-foot{display:flex;flex-direction:column;gap:5px;margin-top:1px;}
.prog-meta{display:flex;justify-content:space-between;align-items:center;}
.prog-pct{font-size:10.5px;font-family:'Geist Mono',monospace;font-weight:600;color:var(--text2);}
.prog-bar{height:4px;background:var(--surface2);border-radius:999px;overflow:hidden;border:1px solid var(--border);}
.prog-fill{height:100%;border-radius:999px;transition:width .4s ease;}

/* ALL PROJECTS LIST */
.proj-list{display:flex;flex-direction:column;gap:8px;margin-bottom:22px;}
.proj-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow);transition:box-shadow .14s,border-color .14s,transform .14s;}
.proj-row:hover{box-shadow:var(--shadow-md);border-color:var(--border2);transform:translateY(-1px);}
.pr-main{display:flex;align-items:center;gap:8px;min-width:160px;flex:1;}
.pr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pr-name{font-size:13.5px;font-weight:600;letter-spacing:-0.15px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-metrics{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pr-metric{display:flex;align-items:baseline;gap:5px;white-space:nowrap;}
.pr-ml{font-size:10px;color:var(--text3);font-family:'Geist Mono',monospace;}
.pr-mv{font-size:12.5px;color:var(--text2);font-weight:600;font-family:'Geist Mono',monospace;}
.pr-open{font-size:10px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:999px;font-family:'Geist Mono',monospace;white-space:nowrap;}
.pr-progress{margin-left:auto;min-width:150px;max-width:180px;width:22%;}
.pr-prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.pr-prog-label{font-size:9px;color:var(--text3);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.7px;}
.pr-prog-pct{font-size:10px;color:var(--text2);font-weight:600;font-family:'Geist Mono',monospace;}
.pr-bar{height:4px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;overflow:hidden;}
.pr-fill{height:100%;border-radius:999px;transition:width .35s ease;}

/* NOTES */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;box-shadow:var(--shadow);transition:box-shadow .16s,border-color .16s;display:flex;flex-direction:column;}
.note-card:hover{box-shadow:var(--shadow-md);border-color:var(--border2);}
.note-card:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s);}
.note-ptag{font-size:9.5px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;font-weight:600;}
.note-title{font-weight:600;font-size:13.5px;outline:none;background:transparent;border:none;color:var(--text);width:100%;font-family:'Geist',sans-serif;letter-spacing:-0.2px;margin-bottom:5px;}
.note-title::placeholder{color:var(--text3);font-weight:400;}
.note-body{font-size:13px;line-height:1.65;color:var(--text2);outline:none;background:transparent;border:none;width:100%;resize:none;min-height:36px;overflow:hidden;font-family:'Geist',sans-serif;flex:1;field-sizing:content;word-break:break-word;overflow-wrap:break-word;}
.note-body::placeholder{color:var(--text3);}
.note-body:focus{color:var(--text);}
.note-imgs{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.note-img-wrap{position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.note-img-wrap img{width:100%;display:block;border-radius:5px;}
.note-img-del{position:absolute;top:4px;right:4px;background:rgba(24,24,31,.55);border:none;color:#fff;cursor:pointer;font-size:11px;padding:2px 5px;border-radius:4px;line-height:1.4;backdrop-filter:blur(4px);transition:background .12s;}
.note-img-del:hover{background:rgba(232,68,90,.85);}
.note-footer{display:flex;align-items:center;justify-content:space-between;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.note-date{font-size:10.5px;color:var(--text3);font-family:'Geist Mono',monospace;}
.note-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:3px 5px;border-radius:4px;transition:color .1s,background .1s;line-height:1;}
.note-del:hover{color:var(--red);background:var(--red-s);}

/* ADD CARD */
.add-card{background:transparent;border:1px dashed var(--border2);border-radius:var(--r);padding:14px;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--text3);cursor:pointer;font-size:12.5px;transition:all .12s;min-height:84px;}
.add-card:hover{border-color:var(--border2);color:var(--text2);background:var(--surface2);}
.add-card.subtle{min-height:70px;padding:11px 12px;border-style:solid;border-color:var(--border);font-size:12px;}

/* ══════════════════════════════════════
   KANBAN BOARD
══════════════════════════════════════ */
.kanban-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.kanban-header-left{display:flex;align-items:center;gap:10px;}
.view-toggle{display:flex;gap:2px;background:var(--surface2);border-radius:8px;padding:3px;border:1px solid var(--border);}
.view-btn{padding:4px 10px;border-radius:5px;border:none;background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Geist',sans-serif;font-weight:500;transition:all .1s;display:flex;align-items:center;gap:5px;}
.view-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow);}
.view-btn:hover:not(.active){color:var(--text2);}

.kanban-board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:stretch;}
.kanban-col{background:var(--surface2);border-radius:14px;border:1px solid var(--border);display:flex;flex-direction:column;transition:background .15s,border-color .15s;height:100%;}
.kanban-col.drag-over{background:var(--accent-s);border-color:var(--accent);}
.kanban-col-header{padding:12px 14px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.kanban-col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.kanban-col-title{font-size:12px;font-weight:600;letter-spacing:.2px;color:var(--text2);flex:1;}
.kanban-col-count{font-size:10.5px;font-family:'Geist Mono',monospace;font-weight:600;background:var(--surface);color:var(--text3);padding:1px 7px;border-radius:20px;border:1px solid var(--border);}
.kanban-cards{padding:10px;display:flex;flex-direction:column;gap:7px;min-height:0;flex:1;}
.kanban-cards:empty{min-height:86px;}
.kanban-cards.drag-over-inner{background:rgba(91,79,255,0.04);border-radius:8px;}

/* Kanban Card */
.k-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 13px;cursor:grab;box-shadow:var(--shadow);transition:box-shadow .16s,transform .16s,border-color .16s,opacity .15s;user-select:none;position:relative;}
.k-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:var(--border2);}
.k-card.dragging{opacity:.4;cursor:grabbing;transform:rotate(1.5deg) scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.12);}
.k-card.drag-placeholder{background:var(--accent-s);border:1.5px dashed var(--accent);box-shadow:none;transform:none;opacity:1;}
.k-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.k-card-text{font-size:13px;line-height:1.5;color:var(--text);font-weight:500;flex:1;word-break:break-word;}
.k-card-del{background:none;border:none;color:transparent;cursor:pointer;font-size:11px;padding:2px 4px;border-radius:4px;transition:all .1s;flex-shrink:0;line-height:1;}
.k-card:hover .k-card-del{color:var(--text3);}
.k-card-del:hover{color:var(--red)!important;background:var(--red-s);}
.k-card-foot{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pri-badge{font-size:9.5px;padding:2px 7px;border-radius:20px;font-family:'Geist Mono',monospace;font-weight:600;letter-spacing:.3px;white-space:nowrap;}
.p-high{background:var(--red-s);color:var(--red);}
.p-mid{background:var(--amber-s);color:var(--amber);}
.p-low{background:var(--green-s);color:var(--green);}
.k-ptag{font-size:9.5px;font-family:'Geist Mono',monospace;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:20px;}

/* Add task inside kanban col */
.k-add-btn{margin:0 10px 10px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .1s;display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 20px);}
.k-add-btn:hover{border-color:var(--border2);color:var(--text2);background:var(--surface);}
.k-more-link{margin:2px 10px 10px;padding:7px 10px;border:1px dashed var(--border2);border-radius:8px;background:transparent;color:var(--text3);font-size:11.5px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .1s;text-align:center;}
.k-more-link:hover{border-color:var(--border2);color:var(--text2);background:var(--surface);}

/* Quick add inline form */
.k-quick-add{margin:0 10px 10px;background:var(--surface);border:1.5px solid var(--accent);border-radius:9px;padding:10px 12px;box-shadow:0 0 0 3px var(--accent-s);}
.k-quick-inp{width:100%;border:none;outline:none;font-size:13px;font-family:'Geist',sans-serif;color:var(--text);background:transparent;margin-bottom:8px;resize:none;min-height:36px;overflow:hidden;field-sizing:content;}
.k-quick-inp::placeholder{color:var(--text3);}
.k-quick-row{display:flex;align-items:center;gap:6px;}
.k-quick-sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 7px;color:var(--text2);font-size:11.5px;font-family:'Geist',sans-serif;outline:none;cursor:pointer;}
.k-quick-ok{background:var(--accent);border:none;border-radius:6px;padding:4px 11px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'Geist',sans-serif;margin-left:auto;transition:opacity .1s;}
.k-quick-ok:hover{opacity:.85;}
.k-quick-cancel{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px;font-family:'Geist',sans-serif;}
.k-quick-cancel:hover{background:var(--surface2);color:var(--text2);}

/* LIST VIEW (existing style) */
.tasks-wrap{max-width:700px;}
.task-item{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;box-shadow:var(--shadow);transition:box-shadow .14s,border-color .14s;cursor:pointer;}
.task-item:hover{box-shadow:var(--shadow-md);}
.task-item:focus-within{border-color:var(--accent);}
.task-item.done{opacity:.5;box-shadow:none;}
.task-item.done .task-text{text-decoration:line-through;color:var(--text3);}
.task-check{width:17px;height:17px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;background:transparent;margin-top:2px;}
.task-check:hover{border-color:var(--green);}
.task-item.done .task-check{background:var(--green);border-color:var(--green);}
.task-check-icon{display:none;font-size:9px;color:#fff;line-height:1;}
.task-item.done .task-check-icon{display:block;}
.task-ptag{font-size:9.5px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.5px;font-weight:600;white-space:nowrap;padding:2px 6px;border-radius:20px;flex-shrink:0;margin-top:2px;}
.task-title-line{flex:1;font-size:13px;line-height:1.55;color:var(--text);font-weight:500;word-break:break-word;cursor:pointer;}
.task-text{flex:1;font-size:13px;outline:none;background:transparent;border:none;color:var(--text);font-family:'Geist',sans-serif;white-space:pre-wrap;word-break:break-word;resize:none;overflow:hidden;line-height:1.55;min-height:20px;field-sizing:content;padding:0;}
.task-text::placeholder{color:var(--text3);}
.task-right{display:flex;align-items:center;gap:5px;flex-shrink:0;margin-top:2px;}
.task-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;opacity:0;transition:opacity .12s,color .12s;padding:3px 4px;border-radius:4px;flex-shrink:0;}
.task-item:hover .task-del{opacity:1;}
.task-del:hover{color:var(--red);background:var(--red-s);}
.add-task-row{display:flex;gap:7px;margin-top:9px;}
.add-task-stack{display:flex;flex-direction:column;gap:7px;margin-top:9px;}
.add-task-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:'Geist',sans-serif;outline:none;box-shadow:var(--shadow);transition:border-color .12s,box-shadow .12s;}
.add-task-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s);}
.add-task-inp::placeholder{color:var(--text3);}
.add-task-desc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:'Geist',sans-serif;outline:none;box-shadow:var(--shadow);transition:border-color .12s,box-shadow .12s;resize:vertical;min-height:74px;line-height:1.55;}
.add-task-desc:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s);}
.add-task-desc::placeholder{color:var(--text3);}
.pri-sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 9px;color:var(--text2);font-size:12.5px;font-family:'Geist',sans-serif;outline:none;cursor:pointer;box-shadow:var(--shadow);}
.add-btn{background:var(--accent);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Geist',sans-serif;transition:opacity .12s,transform .1s,box-shadow .12s;white-space:nowrap;box-shadow:0 1px 2px rgba(91,79,255,.24);}
.add-btn:hover{opacity:.92;box-shadow:0 3px 8px rgba(91,79,255,.22);}
.add-btn:active{transform:scale(.97);}
.done-div{display:flex;align-items:center;gap:10px;margin:16px 0 9px;}
.done-div span{font-size:9.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);font-family:'Geist Mono',monospace;white-space:nowrap;}
.done-div hr{flex:1;border:none;border-top:1px solid var(--border);}

/* SNIPPETS */
.snip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.snip-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;transition:box-shadow .15s,border-color .15s;overflow:hidden;}
.snip-card:hover{box-shadow:var(--shadow-md);border-color:var(--border2);}
.snip-header{display:flex;align-items:center;gap:6px;padding:10px 12px 9px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.snip-title{font-weight:600;font-size:13px;outline:none;background:transparent;border:none;color:var(--text);font-family:'Geist',sans-serif;letter-spacing:-0.2px;min-width:0;flex:1;}
.snip-title::placeholder{color:var(--text3);font-weight:400;}
.snip-lang{font-size:10px;font-family:'Geist Mono',monospace;background:var(--surface2);color:var(--text3);padding:2px 7px;border-radius:5px;font-weight:500;border:1px solid var(--border);cursor:pointer;outline:none;flex-shrink:0;}
.snip-copy{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:3px 6px;border-radius:4px;transition:all .1s;white-space:nowrap;font-family:'Geist Mono',monospace;flex-shrink:0;}
.snip-copy:hover{background:var(--surface2);color:var(--text2);}
.snip-copy.copied{color:var(--green);}
.snip-del{background:none;border:none;color:transparent;cursor:pointer;font-size:11px;padding:3px 4px;border-radius:4px;transition:all .1s;flex-shrink:0;}
.snip-card:hover .snip-del{color:var(--text3);}
.snip-del:hover{color:var(--red)!important;background:var(--red-s);}
.snip-code{font-family:'Geist Mono',monospace;font-size:12px;line-height:1.6;color:var(--text2);background:#fafaf8;padding:12px 13px;border:none;outline:none;width:100%;resize:none;min-height:80px;overflow:hidden;field-sizing:content;tab-size:2;word-break:break-word;}
.snip-code::placeholder{color:var(--text3);}
.snip-code:focus{color:var(--text);background:#f8f8f5;}
.snip-foot{padding:7px 13px;border-top:1px solid var(--border);}
.snip-ptag{font-size:9.5px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:1px;font-weight:600;}

/* FILES TAB */
.files-wrap{max-width:680px;}
.files-section-title{font-size:9.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);font-family:'Geist Mono',monospace;margin-bottom:8px;margin-top:18px;}
.files-section-title:first-child{margin-top:0;}
.file-item{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;box-shadow:var(--shadow);transition:box-shadow .12s,border-color .12s;}
.file-item:hover{box-shadow:var(--shadow-md);border-color:var(--border2);}
.file-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.file-icon.link{background:var(--accent-s);color:var(--accent);}
.file-icon.file{background:var(--green-s);color:var(--green);}
.file-info{flex:1;min-width:0;}
.file-name{font-weight:600;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.file-sub{font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-actions{display:flex;gap:5px;flex-shrink:0;}
.file-open-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text2);font-size:11.5px;cursor:pointer;font-family:'Geist',sans-serif;font-weight:500;transition:all .1s;white-space:nowrap;}
.file-open-btn:hover{background:var(--accent-s);border-color:var(--accent);color:var(--accent);}
.file-del-btn{background:none;border:none;color:transparent;cursor:pointer;font-size:11px;padding:4px 5px;border-radius:5px;transition:all .1s;flex-shrink:0;}
.file-item:hover .file-del-btn{color:var(--text3);}
.file-del-btn:hover{color:var(--red)!important;background:var(--red-s);}
.files-add-row{display:flex;gap:7px;margin-top:10px;}
.files-upload-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 13px;color:var(--text2);font-size:12.5px;font-family:'Geist',sans-serif;cursor:pointer;transition:all .1s;display:flex;align-items:center;gap:6px;white-space:nowrap;font-weight:500;}
.files-upload-btn:hover{background:var(--surface);border-color:var(--border2);color:var(--text);}
.files-upload-btn.subtle{padding:7px 11px;font-size:12px;color:var(--text3);background:transparent;}
.files-upload-btn.subtle:hover{color:var(--text2);background:var(--surface2);}

.ghost-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;font-family:'Geist',sans-serif;transition:all .1s;}
.ghost-btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text2);}

.overview-actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 16px;}
.overview-action-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 11px;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;font-family:'Geist',sans-serif;transition:all .1s;display:flex;align-items:center;gap:6px;}
.overview-action-btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text2);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty .icon{font-size:32px;margin-bottom:10px;opacity:.4;}
.empty p{font-size:13.5px;line-height:1.65;}

/* DIALOG */
.dialog-overlay{position:fixed;inset:0;background:rgba(18,18,28,.22);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .15s;}
.dialog-overlay.open{opacity:1;pointer-events:all;}
.dialog-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px;width:360px;max-width:calc(100vw - 40px);box-shadow:var(--shadow-md);transform:scale(.96) translateY(6px);transition:transform .15s;}
.dialog-overlay.open .dialog-box{transform:scale(1) translateY(0);}
.dialog-title{font-size:14px;font-weight:600;margin-bottom:8px;letter-spacing:-0.2px;}
.dialog-msg{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:18px;}
.dialog-actions{display:flex;gap:8px;justify-content:flex-end;}
.dialog-cancel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text2);font-size:13px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .1s;}
.dialog-cancel:hover{background:var(--border);color:var(--text);}
.dialog-confirm{border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Geist',sans-serif;transition:opacity .1s;}
.dialog-confirm.danger{background:var(--red);color:#fff;}
.dialog-confirm.safe{background:var(--accent);color:#fff;}
.dialog-confirm:hover{opacity:.85;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(18,18,28,.24);display:flex;align-items:center;justify-content:center;z-index:150;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .16s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 22px;width:350px;box-shadow:var(--shadow-md);transform:scale(.96) translateY(6px);transition:transform .16s;}
.modal-overlay.open .modal{transform:scale(1) translateY(0);}
.modal h3{font-size:14px;font-weight:600;margin-bottom:13px;letter-spacing:-0.2px;}
.m-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'Geist',sans-serif;outline:none;margin-bottom:11px;transition:border-color .12s,box-shadow .12s;}
.m-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s);}
.m-inp::placeholder{color:var(--text3);}
.col-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;font-family:'Geist Mono',monospace;}
.col-opts{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;}
.col-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .12s;}
.col-dot.sel{border-color:var(--text);transform:scale(1.15);}
.m-actions{display:flex;gap:7px;justify-content:flex-end;}
.m-cancel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--text2);font-size:12.5px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .1s;}
.m-cancel:hover{background:var(--border);color:var(--text);}

/* FILE MODAL */
.fm-tabs{display:flex;gap:4px;margin-bottom:2px;}
.fm-tab{flex:1;padding:6px 8px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:11.5px;font-family:'Geist',sans-serif;font-weight:500;cursor:pointer;transition:all .1s;text-align:center;}
.fm-tab:hover{background:var(--border);color:var(--text2);}
.fm-tab.active{background:var(--accent-s);border-color:var(--accent);color:var(--accent);font-weight:600;}
.fm-dropzone{border:1.5px dashed var(--border2);border-radius:8px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);cursor:pointer;font-size:12.5px;transition:all .12s;}
.fm-dropzone:hover,.fm-dropzone.drag{border-color:var(--accent);color:var(--accent);background:var(--accent-s);}
.fm-dropzone.has-file{border-color:var(--green);color:var(--green);background:var(--green-s);}
.fmodal-row{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.fmodal-row label{font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.8px;}

.task-meta{font-size:11.5px;color:var(--text3);font-family:'Geist Mono',monospace;line-height:1.6;margin-bottom:10px;}

.due-badge{font-size:9.5px;padding:2px 7px;border-radius:20px;font-family:'Geist Mono',monospace;font-weight:600;letter-spacing:.3px;white-space:nowrap;border:1px solid transparent;}
.due-overdue{background:var(--red-s);color:var(--red);border-color:rgba(232,68,90,.25);}
.due-today{background:var(--amber-s);color:var(--amber);border-color:rgba(217,119,6,.25);}
.due-upcoming{background:var(--surface2);color:var(--text2);border-color:var(--border);}
.subtask-badge{font-size:9.5px;padding:2px 7px;border-radius:20px;font-family:'Geist Mono',monospace;font-weight:600;letter-spacing:.3px;white-space:nowrap;background:var(--surface2);color:var(--text2);border:1px solid var(--border);}

.task-subtasks{display:flex;flex-direction:column;gap:7px;max-height:180px;overflow:auto;padding-right:2px;}
.subtask-row{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 8px;}
.subtask-check{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.subtask-inp{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:12.5px;font-family:'Geist',sans-serif;}
.subtask-inp::placeholder{color:var(--text3);}
.subtask-inp.done{text-decoration:line-through;color:var(--text3);}
.subtask-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:2px 4px;border-radius:4px;line-height:1;}
.subtask-del:hover{color:var(--red);background:var(--red-s);}
.task-subtask-add{display:flex;gap:7px;margin-top:7px;}
.task-subtask-add .m-inp{margin-bottom:0;}
.subtask-add-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text2);font-size:12px;font-family:'Geist',sans-serif;cursor:pointer;transition:all .1s;white-space:nowrap;}
.subtask-add-btn:hover{background:var(--surface);border-color:var(--border2);color:var(--text);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">FI</div>
    <div class="logo-text">FIAE<span> Board</span></div>
  </div>
  <div class="sb-section">
    <div class="sb-title">Navigation</div>
    <div class="nav-item active" id="nav-__all__">
      <svg width="12" height="12" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".7"/></svg>
      Alle Projekte
      <span class="nav-count" id="count-__all__" style="display:none">0</span>
    </div>
  </div>
  <div class="sb-section" style="flex:1">
    <div class="sb-title">Projekte</div>
    <div id="project-list"></div>
  </div>
  <div class="sb-footer">
    <button class="sb-btn" onclick="openProjectModal()">
      <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Neues Projekt
    </button>
    <div class="ei-row">
      <button class="icon-btn" onclick="exportData()">
        <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Export
      </button>
      <button class="icon-btn" onclick="document.getElementById('imp-file').click()">
        <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 9V1M4 4l3-3 3 3M2 11h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Import
      </button>
      <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="proj-title" id="proj-title">
      <svg width="13" height="13" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/></svg>
      Alle Projekte
    </div>
    <div class="topbar-right">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('overview')" id="tab-overview">Übersicht</button>
        <button class="tab-btn" onclick="switchTab('notes')" id="tab-notes">Notizen</button>
        <button class="tab-btn" onclick="switchTab('tasks')" id="tab-tasks">Aufgaben</button>
        <button class="tab-btn" onclick="switchTab('snippets')" id="tab-snippets">Snippets</button>
        <button class="tab-btn" onclick="switchTab('files')" id="tab-files">Dateien</button>
      </div>
    </div>
  </div>
  <div class="content" id="content-area"></div>
</main>

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="proj-modal">
  <div class="modal">
    <h3>Neues Projekt anlegen</h3>
    <input type="text" class="m-inp" id="proj-name-inp" placeholder="z. B. Betrieb, Prüfung, Schule…" maxlength="40">
    <div class="col-label">Farbe wählen</div>
    <div class="col-opts" id="col-opts"></div>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeProjectModal()">Abbrechen</button>
      <button class="add-btn" onclick="createProject()">Erstellen</button>
    </div>
  </div>
</div>

<!-- FILE ADD MODAL -->
<div class="modal-overlay" id="file-modal">
  <div class="modal" style="width:400px">
    <h3>Datei / Link hinzufügen</h3>
    <div class="fm-tabs">
      <button class="fm-tab active" id="fmt-link" onclick="setFmTab('link')">🔗 Web-Link</button>
      <button class="fm-tab" id="fmt-upload" onclick="setFmTab('upload')">⬆ Hochladen</button>
    </div>
    <div class="fmodal-row" style="margin-top:12px">
      <label>Titel / Beschreibung</label>
      <input type="text" class="m-inp" id="fm-title" placeholder="z. B. Confluence, Skript…" maxlength="80" style="margin-bottom:0">
    </div>
    <div class="fmodal-row" id="fm-link-row">
      <label>URL</label>
      <input type="text" class="m-inp" id="fm-url" placeholder="https://…" style="margin-bottom:0">
    </div>
    <div id="fm-upload-row" style="display:none;margin-top:8px">
      <div class="fm-dropzone" id="fm-dropzone" onclick="document.getElementById('fm-file-inp').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 0L8 7m4-4l4 4"/><path d="M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/></svg>
        <span id="fm-drop-label">Klicken oder Datei hierher ziehen</span>
      </div>
      <input type="file" id="fm-file-inp" style="display:none">
      <div style="font-size:11px;color:var(--text3);margin-top:5px">Wird als Base64 gespeichert. Max. ~4 MB empfohlen.</div>
    </div>
    <div class="m-actions" style="margin-top:14px">
      <button class="m-cancel" onclick="closeFileModal()">Abbrechen</button>
      <button class="add-btn" onclick="confirmFileModal()">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- TASK DETAIL MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal" style="width:520px;max-width:calc(100vw - 34px)">
    <h3>Aufgabe</h3>
    <div class="fmodal-row" style="margin-bottom:10px">
      <label>Titel</label>
      <input type="text" class="m-inp" id="task-modal-title" maxlength="120" placeholder="Aufgabentitel" style="margin-bottom:0">
    </div>
    <div class="fmodal-row" style="margin-bottom:10px">
      <label>Beschreibung</label>
      <textarea class="m-inp" id="task-modal-desc" placeholder="Details zur Aufgabe…" style="margin-bottom:0;min-height:130px;resize:vertical;line-height:1.6"></textarea>
    </div>
    <div class="fmodal-row" style="margin-bottom:10px">
      <label>Fälligkeit (optional)</label>
      <input type="date" class="m-inp" id="task-modal-due" style="margin-bottom:0">
    </div>
    <div class="fmodal-row" style="margin-bottom:10px">
      <label>Unteraufgaben</label>
      <div id="task-subtasks" class="task-subtasks"></div>
      <div class="task-subtask-add">
        <input type="text" class="m-inp" id="task-subtask-inp" maxlength="120" placeholder="Unteraufgabe hinzufügen…">
        <button class="subtask-add-btn" onclick="addTaskSubtask()">Hinzufügen</button>
      </div>
    </div>
    <div class="task-meta" id="task-modal-meta"></div>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeTaskModal()">Abbrechen</button>
      <button class="add-btn" onclick="saveTaskModal()">Speichern</button>
    </div>
  </div>
</div>

<!-- TASK CREATE MODAL -->
<div class="modal-overlay" id="task-create-modal">
  <div class="modal" style="width:520px;max-width:calc(100vw - 34px)">
    <h3>Neue Aufgabe</h3>
    <div class="fmodal-row" style="margin-bottom:10px">
      <label>Titel</label>
      <input type="text" class="m-inp" id="task-create-title" maxlength="120" placeholder="Aufgabentitel" style="margin-bottom:0">
    </div>
    <div class="fmodal-row" style="margin-bottom:10px">
      <label>Beschreibung</label>
      <textarea class="m-inp" id="task-create-desc" placeholder="Ausführliche Beschreibung…" style="margin-bottom:0;min-height:130px;resize:vertical;line-height:1.6"></textarea>
    </div>
    <div class="fmodal-row" style="margin-bottom:10px">
      <label>Fälligkeit (optional)</label>
      <input type="date" class="m-inp" id="task-create-due" style="margin-bottom:0">
    </div>
    <div class="add-task-row" style="margin-top:0">
      <select class="pri-sel" id="task-create-pri" style="flex:1">
        <option value="mid">Priorität: Normal</option>
        <option value="high">Priorität: Hoch</option>
        <option value="low">Priorität: Niedrig</option>
      </select>
    </div>
    <div class="m-actions" style="margin-top:14px">
      <button class="m-cancel" onclick="closeCreateTaskModal()">Abbrechen</button>
      <button class="add-btn" onclick="confirmCreateTaskModal()">Erstellen</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="note-create-modal">
  <div class="modal" style="width:520px;max-width:calc(100vw - 34px)">
    <h3>Neue Notiz</h3>
    <div class="fmodal-row" style="margin-bottom:10px">
      <label>Titel</label>
      <input type="text" class="m-inp" id="note-create-title" maxlength="80" placeholder="Notiztitel" style="margin-bottom:0">
    </div>

      <label>Notiz</label>
      <textarea class="m-inp" id="note-create-body" placeholder="Inhalt der Notiz…" style="margin-bottom:0;min-height:130px;resize:vertical;line-height:1.6"></textarea>
    </div>
    <div class="m-actions" style="margin-top:14px">
      <button class="m-cancel" onclick="closeCreateNoteModal()">Abbrechen</button>
      <button class="add-btn" onclick="confirmCreateNoteModal()">Erstellen</button>

</div>

<!-- DIALOG -->
<div class="dialog-overlay" id="dialog-overlay">
  <div class="dialog-box">
    <div class="dialog-title" id="dialog-title"></div>
    <div class="dialog-msg" id="dialog-msg"></div>
    <div class="dialog-actions">
      <button class="dialog-cancel" id="dialog-cancel">Abbrechen</button>
      <button class="dialog-confirm" id="dialog-confirm">OK</button>
    </div>
  </div>
</div>

<script>
const COLORS=['#5b4fff','#e8445a','#1b9e6e','#d97706','#0ea5e9','#9333ea','#db2777','#16a34a'];
const LANGS=['JS','TS','Python','Java','C#','SQL','HTML','CSS','Bash','PHP','JSON','XML','Andere'];
const STATUSES=['todo','inprogress','done'];
const STATUS_LABELS={todo:'Todo',inprogress:'In Arbeit',done:'Erledigt'};
const STATUS_COLORS={todo:'#9595a5',inprogress:'#d97706',done:'#1b9e6e'};

let state=JSON.parse(localStorage.getItem('fiae_v4')||'null')||{projects:[],notes:{},tasks:{},snippets:{},files:{},selColor:COLORS[0]};

// Migrate old done boolean → status field
if(!localStorage.getItem('fiae_v4')&&localStorage.getItem('fiae_v3')){
  try{const o=JSON.parse(localStorage.getItem('fiae_v3'));state={...o,files:{}};state.projects.forEach(p=>{state.files[p.id]=[];});save();}catch(e){}
}
state.projects.forEach(p=>{
  if(!state.snippets[p.id])state.snippets[p.id]=[];
  if(!state.files[p.id])state.files[p.id]=[];
  // Migrate tasks: add status from done bool
  (state.tasks[p.id]||[]).forEach(t=>{
    if(!t.status) t.status = t.done ? 'done' : 'todo';
    if(!t.title){
      const legacy=(t.text||'').trim();
      t.title=legacy?legacy.split('\n')[0].slice(0,120):'';
    }
    if(typeof t.description==='undefined')t.description=(t.text||'').trim();
    if(typeof t.dueDate!=='string')t.dueDate='';
    t.subtasks=normalizeSubtasks(t.subtasks);
  });
});
Object.values(state.notes).forEach(arr=>arr.forEach(n=>{if(!n.images)n.images=[];}));

let curProject='__all__', curTab='overview', curTaskView='kanban', saveTimer=null;
let _fmMode='link', _fmPid='', _fmFileData=null, _fmFileName='';
let _taskModalPid='', _taskModalTid='';
let _taskModalSubtasks=[];
let _taskCreatePid='', _taskCreateStatus='todo';
let _noteCreatePid='';

// Drag state
let dragTaskId=null, dragProjectId=null, dragPlaceholder=null, dragTargetStatus=null, dragDropCommitted=false;

function save(){localStorage.setItem('fiae_v4',JSON.stringify(state));}
function debounceSave(){clearTimeout(saveTimer);saveTimer=setTimeout(save,400);}

// ── DIALOG ──
let _dlgResolve=null;
function dialog(title,msg,confirmLabel='OK',danger=true){
  return new Promise(resolve=>{
    _dlgResolve=resolve;
    document.getElementById('dialog-title').textContent=title;
    document.getElementById('dialog-msg').textContent=msg;
    const cb=document.getElementById('dialog-confirm');
    cb.textContent=confirmLabel;cb.className='dialog-confirm '+(danger?'danger':'safe');
    document.getElementById('dialog-cancel').style.display='';
    document.getElementById('dialog-overlay').classList.add('open');
  });
}
function alert2(title,msg){
  return new Promise(resolve=>{
    _dlgResolve=resolve;
    document.getElementById('dialog-title').textContent=title;
    document.getElementById('dialog-msg').textContent=msg;
    const cb=document.getElementById('dialog-confirm');cb.textContent='OK';cb.className='dialog-confirm safe';
    document.getElementById('dialog-cancel').style.display='none';
    document.getElementById('dialog-overlay').classList.add('open');
  });
}
function closeDlg(val){
  document.getElementById('dialog-overlay').classList.remove('open');
  if(_dlgResolve){_dlgResolve(val);_dlgResolve=null;}
}
document.getElementById('dialog-confirm').addEventListener('click',()=>closeDlg(true));
document.getElementById('dialog-cancel').addEventListener('click',()=>closeDlg(false));
document.getElementById('dialog-overlay').addEventListener('click',e=>{if(e.target.id==='dialog-overlay')closeDlg(false);});

// ── EXPORT / IMPORT ──
function exportData(){
  const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='fiae_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
async function importData(e){
  const file=e.target.files[0];if(!file)return;
  const ok=await dialog('Import','Bestehende Daten werden überschrieben. Fortfahren?','Importieren',false);
  if(!ok){e.target.value='';return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);if(!d.projects)throw new Error();
      state=d;
      if(!state.snippets){state.snippets={};state.projects.forEach(p=>state.snippets[p.id]=[]);}
      if(!state.files){state.files={};state.projects.forEach(p=>state.files[p.id]=[]);}
      Object.values(state.notes).forEach(arr=>arr.forEach(n=>{if(!n.images)n.images=[];}));
      state.projects.forEach(p=>(state.tasks[p.id]||[]).forEach(t=>{
        if(!t.status)t.status=t.done?'done':'todo';
        if(!t.title){
          const legacy=(t.text||'').trim();
          t.title=legacy?legacy.split('\n')[0].slice(0,120):'';
        }
        if(typeof t.description==='undefined')t.description=(t.text||'').trim();
        if(typeof t.dueDate!=='string')t.dueDate='';
        t.subtasks=normalizeSubtasks(t.subtasks);
      }));
      save();curProject='__all__';curTab='overview';renderSidebar();renderContent();
    }catch{alert2('Fehler','Import fehlgeschlagen.');}
  };
  reader.readAsText(file);e.target.value='';
}

// ── SIDEBAR ──
function renderSidebar(){
  const list=document.getElementById('project-list');list.innerHTML='';
  const allNav=document.getElementById('nav-__all__');
  allNav.className='nav-item'+(curProject==='__all__'?' active':'');
  allNav.onclick=()=>selectProject('__all__');
  state.projects.forEach(p=>{
    const open=(state.tasks[p.id]||[]).filter(t=>t.status!=='done').length;
    const el=document.createElement('div');
    el.className='nav-item'+(curProject===p.id?' active':'');el.id='nav-'+p.id;
    el.innerHTML='<div class="project-dot" style="background:'+p.color+'"></div>'+
      '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</span>'+
      (open>0?'<span class="nav-count" style="margin-left:auto">'+open+'</span>':'')+
      '<button class="nav-del" title="Projekt löschen">&#x2715;</button>';
    el.addEventListener('click',function(e){if(e.target.closest('.nav-del'))delProject(p.id);else selectProject(p.id);});
    list.appendChild(el);
  });
  const total=state.projects.reduce((s,p)=>s+(state.tasks[p.id]||[]).filter(t=>t.status!=='done').length,0);
  const ce=document.getElementById('count-__all__');ce.textContent=total;ce.style.display=total>0?'':'none';
}

function selectProject(id){
  curProject=id;
  const p=id==='__all__'?null:state.projects.find(x=>x.id===id);
  document.getElementById('proj-title').innerHTML=p
    ?'<div class="project-dot" style="background:'+p.color+';width:8px;height:8px;border-radius:50%"></div>'+esc(p.name)
    :'<svg width="13" height="13" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/></svg> Alle Projekte';
  switchTab('overview');renderSidebar();
}

// ── PROJECT MODAL ──
function openProjectModal(){
  const opts=document.getElementById('col-opts');opts.innerHTML='';state.selColor=COLORS[0];
  COLORS.forEach(c=>{const d=document.createElement('div');d.className='col-dot'+(c===state.selColor?' sel':'');d.style.background=c;d.onclick=()=>{state.selColor=c;document.querySelectorAll('.col-dot').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};opts.appendChild(d);});
  document.getElementById('proj-name-inp').value='';
  document.getElementById('proj-modal').classList.add('open');
  setTimeout(()=>document.getElementById('proj-name-inp').focus(),100);
}
function closeProjectModal(){document.getElementById('proj-modal').classList.remove('open');}
function createProject(){
  const name=document.getElementById('proj-name-inp').value.trim();if(!name)return;
  const id='p_'+Date.now();
  state.projects.push({id,name,color:state.selColor});
  state.notes[id]=[];state.tasks[id]=[];state.snippets[id]=[];state.files[id]=[];
  save();closeProjectModal();renderSidebar();selectProject(id);
}
async function delProject(id){
  const p=state.projects.find(x=>x.id===id);if(!p)return;
  const ok=await dialog('Projekt löschen','Projekt "'+p.name+'" wirklich löschen?','Löschen');
  if(!ok)return;
  state.projects=state.projects.filter(x=>x.id!==id);
  delete state.notes[id];delete state.tasks[id];delete state.snippets[id];delete state.files[id];
  save();if(curProject===id)selectProject('__all__');else{renderSidebar();renderContent();}
}
document.getElementById('proj-name-inp').addEventListener('keydown',e=>{if(e.key==='Enter')createProject();if(e.key==='Escape')closeProjectModal();});
document.getElementById('proj-modal').addEventListener('click',e=>{if(e.target.id==='proj-modal')closeProjectModal();});
document.getElementById('file-modal').addEventListener('click',e=>{if(e.target.id==='file-modal')closeFileModal();});
document.getElementById('task-modal').addEventListener('click',e=>{if(e.target.id==='task-modal')closeTaskModal();});
document.getElementById('task-create-modal').addEventListener('click',e=>{if(e.target.id==='task-create-modal')closeCreateTaskModal();});
document.getElementById('note-create-modal').addEventListener('click',e=>{if(e.target.id==='note-create-modal')closeCreateNoteModal();});

// ── FILE MODAL ──
function openFileModal(pid){
  _fmPid=pid;_fmFileData=null;_fmFileName='';
  document.getElementById('fm-title').value='';document.getElementById('fm-url').value='';
  document.getElementById('fm-drop-label').textContent='Klicken oder Datei hierher ziehen';
  document.getElementById('fm-dropzone').className='fm-dropzone';
  document.getElementById('file-modal').classList.add('open');setFmTab('link');
  setTimeout(()=>document.getElementById('fm-title').focus(),100);
}
function setFmTab(mode){
  _fmMode=mode;
  ['link','upload'].forEach(t=>{
    document.getElementById('fmt-'+t).classList.toggle('active',t===mode);
    const row=document.getElementById('fm-'+t+'-row');if(row)row.style.display=t===mode?'':'none';
  });
}
function closeFileModal(){document.getElementById('file-modal').classList.remove('open');}
function confirmFileModal(){
  const title=document.getElementById('fm-title').value.trim();if(!title){document.getElementById('fm-title').focus();return;}
  if(_fmMode==='link'){
    let url=document.getElementById('fm-url').value.trim();if(!url){document.getElementById('fm-url').focus();return;}
    if(!/^https?:\/\//i.test(url))url='https://'+url;
    addFileEntry(_fmPid,{id:'f_'+Date.now(),type:'link',title,url,created:Date.now()});closeFileModal();
  } else if(_fmMode==='upload'){
    if(!_fmFileData){alert2('Keine Datei','Bitte zuerst eine Datei auswählen.');return;}
    addFileEntry(_fmPid,{id:'f_'+Date.now(),type:'upload',title,filename:_fmFileName,data:_fmFileData,created:Date.now()});
    _fmFileData=null;_fmFileName='';closeFileModal();
  }
}
function wireFileModal(){
  const inp=document.getElementById('fm-file-inp'),dz=document.getElementById('fm-dropzone');
  if(!inp||!dz)return;
  inp.addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;readUploadFile(file);});
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');const file=e.dataTransfer.files[0];if(!file)return;readUploadFile(file);});
}
function readUploadFile(file){
  _fmFileName=file.name;
  if(!document.getElementById('fm-title').value.trim())document.getElementById('fm-title').value=file.name;
  const reader=new FileReader();
  reader.onload=ev=>{_fmFileData=ev.target.result;document.getElementById('fm-drop-label').textContent=file.name+' ('+formatSize(file.size)+')';document.getElementById('fm-dropzone').className='fm-dropzone has-file';};
  reader.readAsDataURL(file);
}
function addFileEntry(pid,entry){if(!state.files[pid])state.files[pid]=[];state.files[pid].unshift(entry);save();renderContent();}

// ── TABS ──
function switchTab(tab){
  curTab=tab;
  ['overview','notes','tasks','snippets','files'].forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.classList.toggle('active',t===tab);});
  renderContent();
}
function renderContent(){
  const area=document.getElementById('content-area');
  if(curTab==='overview')renderOverview(area);
  else if(curTab==='notes')renderNotes(area);
  else if(curTab==='tasks')renderTasks(area);
  else if(curTab==='snippets')renderSnippets(area);
  else renderFiles(area);
}

// ── OVERVIEW ──
function renderOverview(area){
  const projects=curProject==='__all__'?state.projects:state.projects.filter(p=>p.id===curProject);
  let tNotes=0,tOpen=0,tDone=0,tSnippets=0;
  projects.forEach(p=>{
    tNotes+=(state.notes[p.id]||[]).length;
    tSnippets+=(state.snippets[p.id]||[]).length;
    (state.tasks[p.id]||[]).forEach(t=>t.status==='done'?tDone++:tOpen++);
  });
  let html='<div class="stat-row">'+
    '<div class="stat-card"><div class="stat-label">Projekte</div><div class="stat-value ca">'+projects.length+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Aufgaben offen</div><div class="stat-value cr">'+tOpen+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Erledigt</div><div class="stat-value cg">'+tDone+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Snippets</div><div class="stat-value">'+tSnippets+'</div></div>'+
    '</div>';
  if(curProject==='__all__'){
    if(!state.projects.length){html+='<div class="empty"><div class="icon">📁</div><p>Noch keine Projekte.<br>Erstelle dein erstes Projekt in der Seitenleiste.</p></div>';}
    else{
      html+='<div class="sec-label">Projekte</div><div class="proj-list">';
      projects.forEach(p=>{
        const tasks=(state.tasks[p.id]||[]),open=tasks.filter(t=>t.status!=='done').length,done=tasks.filter(t=>t.status==='done').length,total=tasks.length,pct=total>0?Math.round(done/total*100):0;
        html+='<div class="proj-row" onclick="selectProject(\''+p.id+'\')">'+
          '<div class="pr-main"><div class="pr-dot" style="background:'+p.color+'"></div><div class="pr-name">'+esc(p.name)+'</div></div>'+
          '<div class="pr-open">'+open+' offen</div>'+
          '<div class="pr-metrics">'+
            '<div class="pr-metric"><span class="pr-ml">Notizen</span><span class="pr-mv">'+((state.notes[p.id]||[]).length)+'</span></div>'+
            '<div class="pr-metric"><span class="pr-ml">Erledigt</span><span class="pr-mv" style="color:var(--green)">'+done+'</span></div>'+
            '<div class="pr-metric"><span class="pr-ml">Gesamt</span><span class="pr-mv">'+total+'</span></div>'+
          '</div>'+
          '<div class="pr-progress">'+
            '<div class="pr-prog-meta"><span class="pr-prog-label">Fortschritt</span><span class="pr-prog-pct">'+pct+'%</span></div>'+
            '<div class="pr-bar"><div class="pr-fill" style="width:'+pct+'%;background:'+p.color+'"></div></div>'+
          '</div>'+
          '</div>';
      });
      html+='</div>';
      html+='<div class="sec-label" style="margin-top:6px">Aufgaben-Board</div>'+renderKanban();
    }
  } else {
    const p=state.projects.find(x=>x.id===curProject);if(!p)return;
    const notes=(state.notes[p.id]||[]),tasks=(state.tasks[p.id]||[]),snips=(state.snippets[p.id]||[]),files=(state.files[p.id]||[]);
    html+='<div class="sec-label">Aufgaben-Board</div>'+renderKanban();
    html+='<div class="overview-actions">'+
      '<button class="overview-action-btn" onclick="openCreateTaskModal(\''+p.id+'\',\'todo\')"><svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Aufgabe hinzufügen</button>'+
      '<button class="overview-action-btn" onclick="openCreateNoteModal(\''+p.id+'\')"><svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Neue Notiz</button>'+
      '<button class="overview-action-btn" onclick="openFileModal(\''+p.id+'\')"><svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Datei/Link hinzufügen</button>'+
    '</div>';
    if(!notes.length&&!tasks.length&&!snips.length&&!files.length){html+='<div class="empty" style="padding:28px 20px 12px"><p>Noch nichts hier.<br>Füge Notizen, Aufgaben oder Snippets hinzu.</p></div>';}
    html+='<div class="sec-label" style="margin-top:22px">Notizen</div><div class="notes-grid">';
    notes.slice(0,3).forEach(n=>html+=noteCardHTML(n,null));
    html+='</div>';
    html+='<div class="sec-label" style="margin-top:22px">Dateien &amp; Links</div><div class="files-wrap">';
    if(files.length)files.slice(0,4).forEach(f=>html+=fileItemHTML(f,p.id));
    else html+='<div style="font-size:12.5px;color:var(--text3);padding:6px 0 2px">Noch keine Einträge.</div>';
    html+='</div>';
  }
  area.innerHTML=html;attachListeners();attachKanbanDrag();autoResizeAll();
}

// ── NOTES ──
function renderNotes(area){
  const projects=curProject==='__all__'?state.projects:state.projects.filter(p=>p.id===curProject);
  if(projects.every(p=>!(state.notes[p.id]||[]).length)&&curProject==='__all__'){area.innerHTML='<div class="empty"><div class="icon">📝</div><p>Noch keine Notizen.<br>Wähle ein Projekt aus.</p></div>';return;}
  let html='<div class="notes-grid">';
  projects.forEach(p=>(state.notes[p.id]||[]).forEach(n=>html+=noteCardHTML(n,projects.length>1?{name:p.name,color:p.color}:null)));
  if(curProject!=='__all__')html+='<div class="add-card" onclick="openCreateNoteModal(\''+curProject+'\')"><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Neue Notiz</div>';
  html+='</div>';area.innerHTML=html;attachListeners();autoResizeAll();
}
function noteCardHTML(n,project){
  const d=new Date(n.created),date=String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getFullYear()).slice(-2);
  const imgs=(n.images||[]);
  const imgsHTML=imgs.length?'<div class="note-imgs">'+imgs.map((img,i)=>'<div class="note-img-wrap"><img src="'+img+'" alt="Screenshot"><button class="note-img-del" onclick="delNoteImg(\''+n.projectId+'\',\''+n.id+'\','+i+')">&#x2715;</button></div>').join('')+'</div>':'';
  return '<div class="note-card" data-note-id="'+n.id+'" data-project-id="'+n.projectId+'">'+
    (project?'<div class="note-ptag" style="color:'+project.color+'">'+esc(project.name)+'</div>':'')+
    '<input class="note-title" data-field="title" value="'+esc(n.title)+'" placeholder="Titel…" maxlength="80">'+
    '<textarea class="note-body" data-field="body" placeholder="Notiz…">'+esc(n.body)+'</textarea>'+
    imgsHTML+
    '<div class="note-footer"><span class="note-date">'+date+'</span><button class="note-del" onclick="delNote(\''+n.projectId+'\',\''+n.id+'\')">&#x2715;</button></div>'+
    '</div>';
}
function addNote(pid,title='',body=''){
  const id='n_'+Date.now();if(!state.notes[pid])state.notes[pid]=[];
  state.notes[pid].unshift({id,projectId:pid,title,body,images:[],created:Date.now()});
  save();renderContent();setTimeout(()=>{document.querySelector('[data-note-id="'+id+'"] .note-title')?.focus();autoResizeAll();},50);
}
function openCreateNoteModal(pid){
  _noteCreatePid=pid;
  document.getElementById('note-create-title').value='';
  document.getElementById('note-create-body').value='';
  document.getElementById('note-create-modal').classList.add('open');
  setTimeout(()=>document.getElementById('note-create-title').focus(),80);
}
function closeCreateNoteModal(){
  _noteCreatePid='';
  document.getElementById('note-create-modal').classList.remove('open');
}
function confirmCreateNoteModal(){
  const title=document.getElementById('note-create-title').value.trim();
  const body=document.getElementById('note-create-body').value.trim();
  if(!_noteCreatePid)return;
  if(!title && !body){document.getElementById('note-create-title').focus();return;}
  addNote(_noteCreatePid,title,body);
  closeCreateNoteModal();
}
async function delNote(pid,nid){const ok=await dialog('Notiz löschen','Diese Notiz wirklich löschen?','Löschen');if(!ok)return;state.notes[pid]=(state.notes[pid]||[]).filter(n=>n.id!==nid);save();renderContent();}
function delNoteImg(pid,nid,idx){const note=(state.notes[pid]||[]).find(n=>n.id===nid);if(!note)return;note.images.splice(idx,1);save();renderContent();}

function setTaskView(v){curTaskView=v;renderContent();}

function renderKanban(){
  const projects = curProject==='__all__' ? state.projects : state.projects.filter(p=>p.id===curProject);
  const showP = projects.length > 1;
  const isProjectOverviewCompact = curTab==='overview' && curProject!=='__all__';
  const maxVisiblePerCol = isProjectOverviewCompact ? 3 : Number.POSITIVE_INFINITY;

  // Collect tasks per status
  const cols = {todo:[],inprogress:[],done:[]};
  projects.forEach(p=>{
    (state.tasks[p.id]||[]).forEach(t=>{
      const s = t.status||'todo';
      if(cols[s]) cols[s].push({...t, _pName:p.name, _pColor:p.color});
    });
  });

  let html = '<div class="kanban-board">';
  STATUSES.forEach(status=>{
    const tasks = cols[status];
    const visibleTasks = tasks.slice(0,maxVisiblePerCol);
    const hiddenCount = Math.max(0,tasks.length-visibleTasks.length);
    const dotColor = STATUS_COLORS[status];
    html += '<div class="kanban-col" data-status="'+status+'">'+
      '<div class="kanban-col-header">'+
        '<div class="kanban-col-dot" style="background:'+dotColor+'"></div>'+
        '<span class="kanban-col-title">'+STATUS_LABELS[status]+'</span>'+
        '<span class="kanban-col-count">'+tasks.length+'</span>'+
      '</div>'+
      '<div class="kanban-cards" data-status="'+status+'" id="kcol-'+status+'">';

    visibleTasks.forEach(t=>{
      const tTitle=getTaskTitle(t);
      const dueInfo=getTaskDueInfo(t);
      const subStats=getTaskSubtaskStats(t);
      html += '<div class="k-card" draggable="true" data-task-id="'+t.id+'" data-project-id="'+t.projectId+'" onclick="openTaskModal(\''+t.projectId+'\',\''+t.id+'\')">'+
        '<div class="k-card-top">'+
          '<div class="k-card-text">'+esc(tTitle||'Ohne Titel')+'</div>'+
          '<button class="k-card-del" onclick="event.stopPropagation();delTask(\''+t.projectId+'\',\''+t.id+'\')">&#x2715;</button>'+
        '</div>'+
        '<div class="k-card-foot">'+
          '<span class="pri-badge p-'+t.priority+'">'+(t.priority==='high'?'Hoch':t.priority==='low'?'Niedrig':'Normal')+'</span>'+
          (dueInfo?'<span class="due-badge due-'+dueInfo.state+'">'+esc(dueInfo.label)+'</span>':'')+
          (subStats.total>0?'<span class="subtask-badge">'+subStats.done+'/'+subStats.total+' Steps</span>':'')+
          (showP&&t._pName?'<span class="k-ptag" style="color:'+t._pColor+';background:'+t._pColor+'18">'+esc(t._pName)+'</span>':'')+
        '</div>'+
      '</div>';
    });

    html += '</div>';
    if(hiddenCount>0){
      html += '<button class="k-more-link" onclick="switchTab(\'tasks\')">+'+hiddenCount+' weitere · Weiter zu Aufgaben-Dashboard</button>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// ── KANBAN DRAG & DROP ──
function attachKanbanDrag(){
  document.querySelectorAll('.k-card').forEach(card=>{
    card.addEventListener('dragstart', e=>{
      dragTaskId = card.dataset.taskId;
      dragProjectId = card.dataset.projectId;
      dragTargetStatus = null;
      dragDropCommitted = false;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain', dragTaskId);
      setTimeout(()=>card.style.opacity='0.4',0);
    });
    card.addEventListener('dragend', e=>{
      if(!dragDropCommitted && dragTargetStatus){
        commitDraggedTask(dragTargetStatus);
      }
      card.classList.remove('dragging');
      card.style.opacity='';
      removePlaceholder();
      document.querySelectorAll('.kanban-cards').forEach(c=>c.classList.remove('drag-over-inner'));
      document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-over'));
      dragTaskId=null;dragProjectId=null;dragTargetStatus=null;dragDropCommitted=false;
    });
  });

  document.querySelectorAll('.kanban-col').forEach(colWrap=>{
    const col=colWrap.querySelector('.kanban-cards');
    if(!col)return;

    const markOver=()=>{col.classList.add('drag-over-inner');colWrap.classList.add('drag-over');dragTargetStatus=col.dataset.status;};
    const clearOver=()=>{col.classList.remove('drag-over-inner');colWrap.classList.remove('drag-over');};

    colWrap.addEventListener('dragenter', e=>{
      e.preventDefault();
      markOver();
    });
    colWrap.addEventListener('dragover', e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      markOver();

      // Placeholder positioning
      const draggingCard = document.querySelector('.k-card.dragging');
      if(!draggingCard) return;
      const afterEl = getDragAfterElement(col, e.clientY);
      removePlaceholder();
      dragPlaceholder = document.createElement('div');
      dragPlaceholder.className = 'k-card drag-placeholder';
      dragPlaceholder.style.height = draggingCard.offsetHeight + 'px';
      if(afterEl===null){col.appendChild(dragPlaceholder);}
      else{col.insertBefore(dragPlaceholder, afterEl);}
    });

    colWrap.addEventListener('dragleave', e=>{
      const rt=e.relatedTarget;
      if(rt && colWrap.contains(rt))return;
      clearOver();
      removePlaceholder();
    });

    colWrap.addEventListener('drop', e=>{
      e.preventDefault();
      dragDropCommitted=true;
      clearOver();
      removePlaceholder();
      commitDraggedTask(col.dataset.status);
    });
  });
}

function commitDraggedTask(newStatus){
  if(!dragTaskId || !dragProjectId) return;
  if(!STATUSES.includes(newStatus)) return;
  const task = (state.tasks[dragProjectId]||[]).find(t=>t.id===dragTaskId);
  if(!task) return;
  task.status = newStatus;
  task.done = newStatus==='done';
  save();
  renderContent();
  renderSidebar();
}

function getDragAfterElement(container, y){
  const draggableEls=[...container.querySelectorAll('.k-card:not(.dragging):not(.drag-placeholder)')];
  return draggableEls.reduce((closest,child)=>{
    const box=child.getBoundingClientRect();
    const offset=y-box.top-box.height/2;
    if(offset<0&&offset>closest.offset)return{offset,element:child};
    return closest;
  },{offset:Number.NEGATIVE_INFINITY}).element||null;
}

function removePlaceholder(){
  if(dragPlaceholder){dragPlaceholder.remove();dragPlaceholder=null;}
}

// ── LIST VIEW ──
function renderTaskList(){
  const projects=curProject==='__all__' ? state.projects : state.projects.filter(p=>p.id===curProject);
  const showP=projects.length>1;
  let open=[],done=[];
  projects.forEach(p=>(state.tasks[p.id]||[]).forEach(t=>{const e={...t,_pName:p.name,_pColor:p.color};t.status==='done'?done.push(e):open.push(e);}));

  let html='<div class="tasks-wrap">';
  open.forEach(t=>html+=taskListHTML(t,showP));
  if(curProject!=='__all__')html+='<div class="add-task-row"><button class="ghost-btn" onclick="openCreateTaskModal(\''+curProject+'\',\'todo\')">+ Neue Aufgabe</button></div>';
  if(done.length){html+='<div class="done-div"><hr><span>Erledigt ('+done.length+')</span><hr></div>';done.forEach(t=>html+=taskListHTML(t,showP));}
  html+='</div>';
  return html;
}

const PLABELS={high:'Hoch',mid:'Normal',low:'Niedrig'},PCLASS={high:'p-high',mid:'p-mid',low:'p-low'};
function taskListHTML(t,showP){
  const done=t.status==='done'||t.done;
  const title=getTaskTitle(t);
  const dueInfo=getTaskDueInfo(t);
  const subStats=getTaskSubtaskStats(t);
  return '<div class="task-item '+(done?'done':'')+'" data-task-id="'+t.id+'" data-project-id="'+t.projectId+'" onclick="openTaskModal(\''+t.projectId+'\',\''+t.id+'\')">'+
    '<div class="task-check" onclick="event.stopPropagation();toggleTask(\''+t.projectId+'\',\''+t.id+'\')"><span class="task-check-icon">&#x2713;</span></div>'+
    (showP&&t._pName?'<span class="task-ptag" style="color:'+t._pColor+';background:'+t._pColor+'18">'+esc(t._pName)+'</span>':'')+
    '<div class="task-title-line">'+esc(title||'Ohne Titel')+'</div>'+
    '<div class="task-right"><span class="pri-badge '+(PCLASS[t.priority]||'p-mid')+'">'+(PLABELS[t.priority]||'Normal')+'</span>'+
      (dueInfo?'<span class="due-badge due-'+dueInfo.state+'">'+esc(dueInfo.label)+'</span>':'')+
      (subStats.total>0?'<span class="subtask-badge">'+subStats.done+'/'+subStats.total+' Steps</span>':'')+
      '<button class="task-del" onclick="event.stopPropagation();delTask(\''+t.projectId+'\',\''+t.id+'\')">&#x2715;</button></div>'+
    '</div>';
}

function toggleTask(pid,tid){
  const t=(state.tasks[pid]||[]).find(t=>t.id===tid);
  if(t){t.status=t.status==='done'?'todo':'done';t.done=t.status==='done';save();renderContent();renderSidebar();}
}
async function delTask(pid,tid){
  const ok=await dialog('Aufgabe löschen','Diese Aufgabe wirklich löschen?','Löschen');
  if(!ok)return;
  state.tasks[pid]=(state.tasks[pid]||[]).filter(t=>t.id!==tid);save();renderContent();renderSidebar();
}

function getTaskTitle(task){
  const title=(task.title||'').trim();
  if(title)return title;
  const legacy=(task.text||'').trim();
  if(!legacy)return '';
  return legacy.split('\n')[0].slice(0,120);
}
function getTaskDescription(task){
  if(typeof task.description==='string')return task.description;
  return (task.text||'').trim();
}
function normalizeSubtasks(arr){
  if(!Array.isArray(arr))return [];
  return arr
    .map(s=>({text:((s&&s.text)||'').trim().slice(0,120),done:!!(s&&s.done)}))
    .filter(s=>s.text)
    .slice(0,10);
}
function formatDueDate(dateStr){
  if(!dateStr||!/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(dateStr))return '';
  const [yy,mm,dd]=dateStr.split('-');
  return dd+'.'+mm+'.'+yy;
}
function getTodayKey(){
  const d=new Date();
  const yy=d.getFullYear();
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return yy+'-'+mm+'-'+dd;
}
function getTaskDueInfo(task){
  const due=(task?.dueDate||'').trim();
  if(!due)return null;
  const today=getTodayKey();
  if(due<today)return{state:'overdue',label:'Überfällig'};
  if(due===today)return{state:'today',label:'Heute'};
  return{state:'upcoming',label:'Fällig '+formatDueDate(due)};
}
function getTaskSubtaskStats(task){
  const subtasks=normalizeSubtasks(task?.subtasks);
  const total=subtasks.length;
  const done=subtasks.filter(s=>s.done).length;
  return{done,total};
}
function getTaskCreatedLabel(task){
  if(!task.created)return 'Unbekannt';
  const d=new Date(task.created);
  const dd=String(d.getDate()).padStart(2,'0');
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const yy=d.getFullYear();
  const hh=String(d.getHours()).padStart(2,'0');
  const mi=String(d.getMinutes()).padStart(2,'0');
  return dd+'.'+mm+'.'+yy+' '+hh+':'+mi;
}
function openTaskModal(pid,tid){
  const task=(state.tasks[pid]||[]).find(t=>t.id===tid);
  if(!task)return;
  _taskModalPid=pid;_taskModalTid=tid;
  _taskModalSubtasks=normalizeSubtasks(task.subtasks);
  document.getElementById('task-modal-title').value=getTaskTitle(task);
  document.getElementById('task-modal-desc').value=getTaskDescription(task);
  document.getElementById('task-modal-due').value=task.dueDate||'';
  document.getElementById('task-subtask-inp').value='';
  renderTaskSubtasks();
  const dueInfo=getTaskDueInfo(task);
  document.getElementById('task-modal-meta').textContent='Erstellt: '+getTaskCreatedLabel(task)+(task.priority?' · Priorität: '+(PLABELS[task.priority]||'Normal'):'')+(dueInfo?' · '+dueInfo.label:'');
  document.getElementById('task-modal').classList.add('open');
  setTimeout(()=>document.getElementById('task-modal-title').focus(),80);
}
function closeTaskModal(){
  _taskModalPid='';_taskModalTid='';
  _taskModalSubtasks=[];
  const subInp=document.getElementById('task-subtask-inp');
  if(subInp)subInp.value='';
  document.getElementById('task-modal').classList.remove('open');
}
function renderTaskSubtasks(){
  const wrap=document.getElementById('task-subtasks');
  if(!wrap)return;
  if(!_taskModalSubtasks.length){
    wrap.innerHTML='<div style="font-size:12px;color:var(--text3);padding:3px 1px">Noch keine Unteraufgaben.</div>';
    return;
  }
  wrap.innerHTML=_taskModalSubtasks.map((s,i)=>
    '<div class="subtask-row">'+
      '<input class="subtask-check" type="checkbox" '+(s.done?'checked':'')+' onchange="toggleModalSubtask('+i+')">'+
      '<input class="subtask-inp '+(s.done?'done':'')+'" value="'+esc(s.text)+'" oninput="updateModalSubtaskText('+i+', this.value)" placeholder="Unteraufgabe">'+
      '<button class="subtask-del" onclick="removeModalSubtask('+i+')">&#x2715;</button>'+
    '</div>'
  ).join('');
}
function addTaskSubtask(){
  const inp=document.getElementById('task-subtask-inp');
  if(!inp)return;
  const text=inp.value.trim();
  if(!text)return;
  if(_taskModalSubtasks.length>=10){alert2('Maximal erreicht','Du kannst maximal 10 Unteraufgaben anlegen.');return;}
  _taskModalSubtasks.push({text:text.slice(0,120),done:false});
  inp.value='';
  renderTaskSubtasks();
  inp.focus();
}
function toggleModalSubtask(index){
  const item=_taskModalSubtasks[index];
  if(!item)return;
  item.done=!item.done;
  renderTaskSubtasks();
}
function updateModalSubtaskText(index,value){
  const item=_taskModalSubtasks[index];
  if(!item)return;
  item.text=value.slice(0,120);
}
function removeModalSubtask(index){
  _taskModalSubtasks.splice(index,1);
  renderTaskSubtasks();
}
function saveTaskModal(){
  const title=document.getElementById('task-modal-title').value.trim();
  const description=document.getElementById('task-modal-desc').value.trim();
  const dueDate=(document.getElementById('task-modal-due').value||'').trim();
  if(!title){document.getElementById('task-modal-title').focus();return;}
  const task=(state.tasks[_taskModalPid]||[]).find(t=>t.id===_taskModalTid);
  if(!task)return;
  task.title=title;
  task.description=description;
  task.dueDate=dueDate;
  task.subtasks=normalizeSubtasks(_taskModalSubtasks);
  save();
  closeTaskModal();
  renderContent();
  renderSidebar();
}
function openCreateTaskModal(pid,status='todo'){
  _taskCreatePid=pid;
  _taskCreateStatus=STATUSES.includes(status)?status:'todo';
  document.getElementById('task-create-title').value='';
  document.getElementById('task-create-desc').value='';
  document.getElementById('task-create-due').value='';
  document.getElementById('task-create-pri').value='mid';
  document.getElementById('task-create-modal').classList.add('open');
  setTimeout(()=>document.getElementById('task-create-title').focus(),80);
}
function closeCreateTaskModal(){
  _taskCreatePid='';
  _taskCreateStatus='todo';
  document.getElementById('task-create-modal').classList.remove('open');
}
function confirmCreateTaskModal(){
  const title=document.getElementById('task-create-title').value.trim();
  const description=document.getElementById('task-create-desc').value.trim();
  const dueDate=(document.getElementById('task-create-due').value||'').trim();
  const priority=document.getElementById('task-create-pri').value;
  if(!title){document.getElementById('task-create-title').focus();return;}
  if(!_taskCreatePid)return;
  if(!state.tasks[_taskCreatePid])state.tasks[_taskCreatePid]=[];
  state.tasks[_taskCreatePid].unshift({
    id:'t_'+Date.now(),
    projectId:_taskCreatePid,
    title,
    description,
    dueDate,
    subtasks:[],
    priority,
    status:_taskCreateStatus,
    done:_taskCreateStatus==='done',
    created:Date.now()
  });
  save();
  closeCreateTaskModal();
  renderContent();
  renderSidebar();
}

function snippetHTML(s,project){

function addSnippet(pid){const id='s_'+Date.now();if(!state.snippets[pid])state.snippets[pid]=[];state.snippets[pid].unshift({id,projectId:pid,title:'',code:'',lang:'JS',created:Date.now()});save();renderContent();setTimeout(()=>{document.querySelector('[data-snippet-id="'+id+'"] .snip-title')?.focus();autoResizeAll();},50);}
async function delSnippet(pid,sid){const ok=await dialog('Snippet löschen','Dieses Snippet wirklich löschen?','Löschen');if(!ok)return;state.snippets[pid]=(state.snippets[pid]||[]).filter(s=>s.id!==sid);save();renderContent();}
function copySnippet(sid,pid){const s=(state.snippets[pid]||[]).find(x=>x.id===sid);if(!s)return;navigator.clipboard.writeText(s.code).then(()=>{const btn=document.querySelector('[data-snippet-id="'+sid+'"] .snip-copy');if(btn){btn.textContent='Kopiert!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Kopieren';btn.classList.remove('copied');},1800);}});}

  const files=(state.files[curProject]||[]);
