<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIAE Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f5f5f0;
    --surface:   #ffffff;
    --surface2:  #f0efeb;
    --border:    #e2e1dc;
    --border2:   #d0cfc9;
    --accent:    #5b4fff;
    --accent-s:  rgba(91,79,255,0.1);
    --red:       #e8445a;
    --red-s:     rgba(232,68,90,0.1);
    --green:     #1b9e6e;
    --green-s:   rgba(27,158,110,0.1);
    --amber:     #d97706;
    --amber-s:   rgba(217,119,6,0.1);
    --text:      #1a1a24;
    --text2:     #5a5a6e;
    --text3:     #9898a8;
    --shadow:    0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    min-height: 100vh;
    display: flex;
    overflow: hidden;
    font-size: 14px;
  }

  /* SIDEBAR */
  .sidebar {
    width: 230px;
    min-width: 230px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }
  .logo-text span { color: var(--text3); font-weight: 400; }

  .sidebar-section { padding: 14px 12px 6px; }

  .sidebar-section-title {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'Geist Mono', monospace;
    padding: 0 4px;
    margin-bottom: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 7px 8px;
    cursor: pointer;
    border-radius: 7px;
    transition: background 0.12s;
    font-size: 13.5px;
    color: var(--text2);
    user-select: none;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-s); color: var(--accent); font-weight: 500; }

  .project-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .nav-count {
    margin-left: auto;
    font-size: 11px;
    background: var(--surface2);
    color: var(--text3);
    padding: 1px 7px;
    border-radius: 20px;
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
  }

  .nav-item.active .nav-count { background: var(--accent); color: #fff; }

  .sidebar-footer {
    margin-top: auto;
    padding: 12px;
    border-top: 1px solid var(--border);
  }

  .add-project-btn {
    width: 100%;
    padding: 8px 10px;
    background: transparent;
    border: 1.5px dashed var(--border2);
    border-radius: 7px;
    color: var(--text3);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    font-family: 'Geist', sans-serif;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .add-project-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-s); }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; height: 100vh; }

  .topbar {
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .project-title-display {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.3px;
  }

  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 6px; }

  .tab-bar {
    display: flex;
    gap: 2px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 3px;
  }

  .tab-btn {
    padding: 5px 13px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--text3);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Geist', sans-serif;
    font-weight: 500;
    transition: all 0.12s;
  }

  .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
  .tab-btn:hover:not(.active) { color: var(--text2); }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* STATS */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Geist Mono', monospace;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 600;
    font-family: 'Geist Mono', monospace;
    letter-spacing: -1px;
  }

  .stat-value.c-accent { color: var(--accent); }
  .stat-value.c-red    { color: var(--red); }
  .stat-value.c-green  { color: var(--green); }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text3);
    font-family: 'Geist Mono', monospace;
    margin-bottom: 10px;
    margin-top: 4px;
  }

  /* PROJECT CARDS */
  .project-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: box-shadow 0.12s, transform 0.12s;
  }

  .project-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

  .project-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

  .project-card-name {
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.2px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .project-card-meta {
    display: flex;
    gap: 10px;
    font-size: 12px;
    color: var(--text3);
    font-family: 'Geist Mono', monospace;
  }

  .progress-bar { height: 3px; background: var(--surface2); border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  /* NOTES */
  .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }

  .note-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.15s, border-color 0.15s;
    display: flex;
    flex-direction: column;
  }

  .note-card:hover { box-shadow: var(--shadow-md); border-color: var(--border2); }
  .note-card:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-s); }

  .note-project-tag {
    font-size: 10px;
    font-family: 'Geist Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .note-title {
    font-weight: 600;
    font-size: 14px;
    outline: none;
    background: transparent;
    border: none;
    color: var(--text);
    width: 100%;
    font-family: 'Geist', sans-serif;
    letter-spacing: -0.2px;
    margin-bottom: 6px;
  }

  .note-title::placeholder { color: var(--text3); font-weight: 400; }

  .note-body {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text2);
    outline: none;
    background: transparent;
    border: none;
    width: 100%;
    resize: none;
    min-height: 72px;
    font-family: 'Geist', sans-serif;
    flex: 1;
  }

  .note-body::placeholder { color: var(--text3); }
  .note-body:focus { color: var(--text); }

  .note-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .note-date { font-size: 11px; color: var(--text3); font-family: 'Geist Mono', monospace; }

  .note-delete {
    background: none; border: none;
    color: var(--text3); cursor: pointer; font-size: 13px;
    padding: 3px 5px; border-radius: 4px;
    transition: color 0.12s, background 0.12s; line-height: 1;
  }

  .note-delete:hover { color: var(--red); background: var(--red-s); }

  .add-note-card {
    background: transparent;
    border: 1.5px dashed var(--border2);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text3);
    cursor: pointer;
    font-size: 13.5px;
    transition: all 0.12s;
    min-height: 110px;
  }

  .add-note-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-s); }

  /* TASKS */
  .tasks-container { max-width: 680px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.12s, border-color 0.12s;
  }

  .task-item:hover { box-shadow: var(--shadow-md); }
  .task-item:focus-within { border-color: var(--accent); }
  .task-item.done { opacity: 0.55; box-shadow: none; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--text3); }

  .task-check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
    background: transparent;
  }

  .task-check:hover { border-color: var(--green); }
  .task-item.done .task-check { background: var(--green); border-color: var(--green); }

  .task-check-icon { display: none; font-size: 10px; color: #fff; line-height: 1; }
  .task-item.done .task-check-icon { display: block; }

  .task-project-tag {
    font-size: 10px;
    font-family: 'Geist Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    white-space: nowrap;
    padding: 2px 7px;
    border-radius: 20px;
  }

  .task-text {
    flex: 1;
    font-size: 13.5px;
    outline: none;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Geist', sans-serif;
  }

  .task-text::placeholder { color: var(--text3); }

  .priority-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .p-high { background: var(--red-s);   color: var(--red); }
  .p-mid  { background: var(--amber-s); color: var(--amber); }
  .p-low  { background: var(--green-s); color: var(--green); }

  .task-delete {
    background: none; border: none;
    color: var(--text3); cursor: pointer; font-size: 13px;
    opacity: 0; transition: opacity 0.12s, color 0.12s;
    padding: 3px 5px; border-radius: 4px; flex-shrink: 0;
  }

  .task-item:hover .task-delete { opacity: 1; }
  .task-delete:hover { color: var(--red); background: var(--red-s); }

  .add-task-row { display: flex; gap: 8px; margin-top: 10px; }

  .add-task-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 13px;
    color: var(--text);
    font-size: 13.5px;
    font-family: 'Geist', sans-serif;
    outline: none;
    box-shadow: var(--shadow);
    transition: border-color 0.12s, box-shadow 0.12s;
  }

  .add-task-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-s); }
  .add-task-input::placeholder { color: var(--text3); }

  .priority-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 10px;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Geist', sans-serif;
    outline: none;
    cursor: pointer;
    box-shadow: var(--shadow);
  }

  .add-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Geist', sans-serif;
    transition: opacity 0.12s, transform 0.1s;
    white-space: nowrap;
  }

  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.97); }

  .done-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0 10px;
  }

  .done-divider span {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text3);
    font-family: 'Geist Mono', monospace;
    white-space: nowrap;
  }

  .done-divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }

  /* EMPTY */
  .empty-state { text-align: center; padding: 64px 20px; color: var(--text3); }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,26,36,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    backdrop-filter: blur(3px);
    opacity: 0; pointer-events: none; transition: opacity 0.18s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
    width: 360px;
    box-shadow: var(--shadow-md);
    transform: scale(0.96) translateY(4px);
    transition: transform 0.18s;
  }

  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; letter-spacing: -0.2px; }

  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13.5px;
    font-family: 'Geist', sans-serif;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.12s, box-shadow 0.12s;
  }

  .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-s); }
  .modal-input::placeholder { color: var(--text3); }

  .color-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-family: 'Geist Mono', monospace; }
  .color-options { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }

  .color-dot {
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; border: 2.5px solid transparent;
    transition: transform 0.12s;
  }

  .color-dot.selected { border-color: var(--text); transform: scale(1.15); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  .modal-cancel {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; color: var(--text2);
    font-size: 13px; cursor: pointer; font-family: 'Geist', sans-serif;
    transition: all 0.12s;
  }

  .modal-cancel:hover { background: var(--border); color: var(--text); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">FI</div>
    <div class="logo-text">FIAE<span> Board</span></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-title">Navigation</div>
    <div class="nav-item active" id="nav-__all__" onclick="selectProject('__all__')">
      <svg width="13" height="13" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".7"/></svg>
      Alle Projekte
      <span class="nav-count" id="count-__all__" style="display:none">0</span>
    </div>
  </div>
  <div class="sidebar-section" style="flex:1">
    <div class="sidebar-section-title">Projekte</div>
    <div id="project-list"></div>
  </div>
  <div class="sidebar-footer">
    <button class="add-project-btn" onclick="openProjectModal()">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Neues Projekt
    </button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="project-title-display" id="project-title-display">
      <svg width="14" height="14" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/></svg>
      Alle Projekte
    </div>
    <div class="topbar-actions">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('overview')" id="tab-overview">Übersicht</button>
        <button class="tab-btn" onclick="switchTab('notes')" id="tab-notes">Notizen</button>
        <button class="tab-btn" onclick="switchTab('tasks')" id="tab-tasks">Aufgaben</button>
      </div>
    </div>
  </div>
  <div class="content" id="content-area"></div>
</main>

<div class="modal-overlay" id="project-modal">
  <div class="modal">
    <h3>Neues Projekt anlegen</h3>
    <input type="text" class="modal-input" id="project-name-input" placeholder="z. B. Betrieb, Prüfung, Schule…" maxlength="40">
    <div class="color-label">Farbe wählen</div>
    <div class="color-options" id="color-options"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeProjectModal()">Abbrechen</button>
      <button class="add-btn" onclick="createProject()">Erstellen</button>
    </div>
  </div>
</div>

<script>
const COLORS = ['#5b4fff','#e8445a','#1b9e6e','#d97706','#0ea5e9','#9333ea','#db2777','#16a34a'];

let state = JSON.parse(localStorage.getItem('fiae_v2') || 'null') || {
  projects: [], notes: {}, tasks: {}, selColor: COLORS[0]
};

let curProject = '__all__';
let curTab = 'overview';
let saveTimer = null;

function save() { localStorage.setItem('fiae_v2', JSON.stringify(state)); }
function debounceSave() { clearTimeout(saveTimer); saveTimer = setTimeout(save, 400); }

// ── SIDEBAR ──
function renderSidebar() {
  const list = document.getElementById('project-list');
  list.innerHTML = '';
  state.projects.forEach(p => {
    const open = (state.tasks[p.id] || []).filter(t => !t.done).length;
    const el = document.createElement('div');
    el.className = 'nav-item' + (curProject === p.id ? ' active' : '');
    el.id = `nav-${p.id}`;
    el.innerHTML = `
      <div class="project-dot" style="background:${p.color}"></div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</span>
      ${open > 0 ? `<span class="nav-count">${open}</span>` : ''}
    `;
    el.onclick = () => selectProject(p.id);
    list.appendChild(el);
  });
  const total = state.projects.reduce((s, p) => s + (state.tasks[p.id] || []).filter(t => !t.done).length, 0);
  const countEl = document.getElementById('count-__all__');
  countEl.textContent = total;
  countEl.style.display = total > 0 ? '' : 'none';
}

function selectProject(id) {
  curProject = id;
  curTab = 'overview';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${id}`)?.classList.add('active');
  const p = id === '__all__' ? null : state.projects.find(x => x.id === id);
  document.getElementById('project-title-display').innerHTML = p
    ? `<div class="project-dot" style="background:${p.color};width:10px;height:10px;border-radius:50%"></div>${esc(p.name)}`
    : `<svg width="14" height="14" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/></svg> Alle Projekte`;
  switchTab('overview');
  renderSidebar();
}

// ── MODAL ──
function openProjectModal() {
  const opts = document.getElementById('color-options');
  opts.innerHTML = '';
  state.selColor = COLORS[0];
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'color-dot' + (c === state.selColor ? ' selected' : '');
    d.style.background = c;
    d.onclick = () => {
      state.selColor = c;
      document.querySelectorAll('.color-dot').forEach(x => x.classList.remove('selected'));
      d.classList.add('selected');
    };
    opts.appendChild(d);
  });
  document.getElementById('project-name-input').value = '';
  document.getElementById('project-modal').classList.add('open');
  setTimeout(() => document.getElementById('project-name-input').focus(), 100);
}

function closeProjectModal() { document.getElementById('project-modal').classList.remove('open'); }

function createProject() {
  const name = document.getElementById('project-name-input').value.trim();
  if (!name) return;
  const id = 'p_' + Date.now();
  state.projects.push({ id, name, color: state.selColor });
  state.notes[id] = [];
  state.tasks[id] = [];
  save(); closeProjectModal(); renderSidebar(); selectProject(id);
}

document.getElementById('project-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') createProject();
  if (e.key === 'Escape') closeProjectModal();
});
document.getElementById('project-modal').addEventListener('click', e => {
  if (e.target.id === 'project-modal') closeProjectModal();
});

// ── TABS ──
function switchTab(tab) {
  curTab = tab;
  ['overview','notes','tasks'].forEach(t => document.getElementById(`tab-${t}`).classList.toggle('active', t === tab));
  renderContent();
}

function renderContent() {
  const area = document.getElementById('content-area');
  if (curTab === 'overview') renderOverview(area);
  else if (curTab === 'notes') renderNotes(area);
  else renderTasks(area);
}

// ── OVERVIEW ──
function renderOverview(area) {
  const projects = curProject === '__all__' ? state.projects : state.projects.filter(p => p.id === curProject);
  let tNotes = 0, tOpen = 0, tDone = 0;
  projects.forEach(p => {
    tNotes += (state.notes[p.id] || []).length;
    (state.tasks[p.id] || []).forEach(t => t.done ? tDone++ : tOpen++);
  });

  let html = `<div class="stat-row">
    <div class="stat-card"><div class="stat-label">Projekte</div><div class="stat-value c-accent">${projects.length}</div></div>
    <div class="stat-card"><div class="stat-label">Notizen</div><div class="stat-value">${tNotes}</div></div>
    <div class="stat-card"><div class="stat-label">Offen</div><div class="stat-value c-red">${tOpen}</div></div>
    <div class="stat-card"><div class="stat-label">Erledigt</div><div class="stat-value c-green">${tDone}</div></div>
  </div>`;

  if (curProject === '__all__') {
    if (!state.projects.length) {
      html += `<div class="empty-state"><div class="icon">📁</div><p>Noch keine Projekte.<br>Erstelle dein erstes Projekt in der Seitenleiste.</p></div>`;
    } else {
      html += `<div class="section-label">Projekte</div><div class="project-cards">`;
      projects.forEach(p => {
        const tasks = state.tasks[p.id] || [];
        const open = tasks.filter(t => !t.done).length;
        const done = tasks.filter(t => t.done).length;
        const total = tasks.length;
        const pct = total > 0 ? Math.round(done/total*100) : 0;
        html += `<div class="project-card" onclick="selectProject('${p.id}')">
          <div class="project-card-top">
            <div class="project-dot" style="background:${p.color};width:10px;height:10px;border-radius:50%"></div>
            <div class="project-card-name">${esc(p.name)}</div>
          </div>
          <div class="project-card-meta">
            <span>📝 ${(state.notes[p.id]||[]).length}</span>
            <span>✓ ${open} offen</span>
            ${total > 0 ? `<span style="color:var(--green)">${pct}%</span>` : ''}
          </div>
          ${total > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${p.color}"></div></div>` : ''}
        </div>`;
      });
      html += `</div>`;
      const allOpen = [];
      projects.forEach(p => (state.tasks[p.id]||[]).filter(t=>!t.done).forEach(t => allOpen.push({...t,_pName:p.name,_pColor:p.color})));
      if (allOpen.length) {
        html += `<div class="section-label" style="margin-top:8px">Offene Aufgaben</div><div class="tasks-container">`;
        allOpen.slice(0,8).forEach(t => html += taskHTML(t, true));
        html += `</div>`;
      }
    }
  } else {
    const p = state.projects.find(x => x.id === curProject);
    if (!p) return;
    const notes = state.notes[p.id] || [];
    const open = (state.tasks[p.id]||[]).filter(t=>!t.done);
    if (!notes.length && !open.length) {
      html += `<div class="empty-state"><div class="icon">✨</div><p>Noch nichts hier.<br>Füge Notizen oder Aufgaben hinzu.</p></div>`;
    } else {
      if (open.length) {
        html += `<div class="section-label">Offene Aufgaben</div><div class="tasks-container">`;
        open.slice(0,5).forEach(t => html += taskHTML(t, false));
        html += `</div>`;
      }
      if (notes.length) {
        html += `<div class="section-label" style="margin-top:${open.length?24:0}px">Letzte Notizen</div><div class="notes-grid">`;
        notes.slice(0,4).forEach(n => html += noteCardHTML(n, null));
        html += `</div>`;
      }
    }
  }
  area.innerHTML = html;
  attachListeners();
}

// ── NOTES ──
function renderNotes(area) {
  const projects = curProject === '__all__' ? state.projects : state.projects.filter(p => p.id === curProject);
  const allEmpty = projects.every(p => !(state.notes[p.id]||[]).length);

  if (allEmpty && curProject === '__all__') {
    area.innerHTML = `<div class="empty-state"><div class="icon">📝</div><p>Noch keine Notizen.<br>Wähle ein Projekt aus.</p></div>`;
    return;
  }

  let html = `<div class="notes-grid">`;
  projects.forEach(p => {
    (state.notes[p.id]||[]).forEach(n => html += noteCardHTML(n, projects.length > 1 ? {name:p.name,color:p.color} : null));
  });
  if (curProject !== '__all__') {
    html += `<div class="add-note-card" onclick="addNote('${curProject}')">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Neue Notiz
    </div>`;
  }
  html += `</div>`;
  area.innerHTML = html;
  attachListeners();
}

function noteCardHTML(n, project) {
  const d = new Date(n.created);
  const date = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getFullYear()).slice(-2)}`;
  return `<div class="note-card" data-note-id="${n.id}" data-project-id="${n.projectId}">
    ${project ? `<div class="note-project-tag" style="color:${project.color}">${esc(project.name)}</div>` : ''}
    <input class="note-title" data-field="title" value="${esc(n.title)}" placeholder="Titel…" maxlength="80">
    <textarea class="note-body" data-field="body" placeholder="Notiz…">${esc(n.body)}</textarea>
    <div class="note-footer">
      <span class="note-date">${date}</span>
      <button class="note-delete" onclick="deleteNote('${n.projectId}','${n.id}')">✕</button>
    </div>
  </div>`;
}

function addNote(projectId) {
  const id = 'n_' + Date.now();
  if (!state.notes[projectId]) state.notes[projectId] = [];
  state.notes[projectId].unshift({ id, projectId, title: '', body: '', created: Date.now() });
  save(); renderContent();
  setTimeout(() => document.querySelector(`[data-note-id="${id}"] .note-title`)?.focus(), 50);
}

function deleteNote(projectId, noteId) {
  if (!confirm('Notiz löschen?')) return;
  state.notes[projectId] = (state.notes[projectId]||[]).filter(n => n.id !== noteId);
  save(); renderContent();
}

// ── TASKS ──
function renderTasks(area) {
  const projects = curProject === '__all__' ? state.projects : state.projects.filter(p => p.id === curProject);
  const showProject = projects.length > 1;
  let open = [], done = [];
  projects.forEach(p => {
    (state.tasks[p.id]||[]).forEach(t => {
      const e = {...t, _pName:p.name, _pColor:p.color};
      t.done ? done.push(e) : open.push(e);
    });
  });

  if (!open.length && curProject === '__all__' && state.projects.length) {
    area.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>Alle Aufgaben erledigt!</p></div>`;
    return;
  }
  if (!state.projects.length) {
    area.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>Noch keine Projekte angelegt.</p></div>`;
    return;
  }

  let html = `<div class="tasks-container">`;
  open.forEach(t => html += taskHTML(t, showProject));

  if (curProject !== '__all__') {
    html += `<div class="add-task-row">
      <input type="text" class="add-task-input" id="new-task-input" placeholder="Neue Aufgabe…">
      <select class="priority-select" id="new-task-priority">
        <option value="mid">Normal</option>
        <option value="high">Hoch</option>
        <option value="low">Niedrig</option>
      </select>
      <button class="add-btn" onclick="addTask('${curProject}')">＋ Hinzufügen</button>
    </div>`;
  }

  if (done.length) {
    html += `<div class="done-divider"><hr><span>Erledigt (${done.length})</span><hr></div>`;
    done.forEach(t => html += taskHTML(t, showProject));
  }

  html += `</div>`;
  area.innerHTML = html;
  attachListeners();

  document.getElementById('new-task-input')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask(curProject);
  });
}

const PLABELS = { high: 'Hoch', mid: 'Normal', low: 'Niedrig' };
const PCLASS  = { high: 'p-high', mid: 'p-mid', low: 'p-low' };

function taskHTML(t, showProject) {
  return `<div class="task-item ${t.done?'done':''}" data-task-id="${t.id}" data-project-id="${t.projectId}">
    <div class="task-check" onclick="toggleTask('${t.projectId}','${t.id}')">
      <span class="task-check-icon">✓</span>
    </div>
    ${showProject && t._pName ? `<span class="task-project-tag" style="color:${t._pColor};background:${t._pColor}18">${esc(t._pName)}</span>` : ''}
    <input class="task-text" value="${esc(t.text)}" placeholder="Aufgabe…" ${t.done?'readonly':''}>
    <span class="priority-badge ${PCLASS[t.priority]||'p-mid'}">${PLABELS[t.priority]||'Normal'}</span>
    <button class="task-delete" onclick="deleteTask('${t.projectId}','${t.id}')">✕</button>
  </div>`;
}

function addTask(projectId) {
  const input = document.getElementById('new-task-input');
  const priority = document.getElementById('new-task-priority').value;
  const text = input.value.trim();
  if (!text) return;
  if (!state.tasks[projectId]) state.tasks[projectId] = [];
  state.tasks[projectId].unshift({ id:'t_'+Date.now(), projectId, text, priority, done:false, created:Date.now() });
  save(); renderContent(); renderSidebar();
}

function toggleTask(projectId, taskId) {
  const t = (state.tasks[projectId]||[]).find(t => t.id === taskId);
  if (t) { t.done = !t.done; save(); renderContent(); renderSidebar(); }
}

function deleteTask(projectId, taskId) {
  state.tasks[projectId] = (state.tasks[projectId]||[]).filter(t => t.id !== taskId);
  save(); renderContent(); renderSidebar();
}

// ── LISTENERS ──
function attachListeners() {
  document.querySelectorAll('.note-title, .note-body').forEach(el => {
    el.addEventListener('input', () => {
      const card = el.closest('.note-card');
      const note = (state.notes[card.dataset.projectId]||[]).find(n => n.id === card.dataset.noteId);
      if (note) { note[el.dataset.field] = el.value; debounceSave(); }
    });
  });
  document.querySelectorAll('.task-text').forEach(el => {
    el.addEventListener('change', () => {
      const item = el.closest('.task-item');
      const task = (state.tasks[item.dataset.projectId]||[]).find(t => t.id === item.dataset.taskId);
      if (task) { task.text = el.value; save(); }
    });
  });
}

function esc(s='') {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

renderSidebar();
renderContent();
</script>
</body>
</html>
