<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIAE Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f4f0;--surface:#fff;--surface2:#eeeee9;--border:#e0dfd9;--border2:#ccccc5;
  --accent:#5b4fff;--accent-s:rgba(91,79,255,0.08);
  --red:#e8445a;--red-s:rgba(232,68,90,0.09);
  --green:#1b9e6e;--green-s:rgba(27,158,110,0.09);
  --amber:#d97706;--amber-s:rgba(217,119,6,0.09);
  --text:#18181f;--text2:#55556a;--text3:#9595a5;
  --shadow:0 1px 2px rgba(0,0,0,0.06);
  --shadow-md:0 4px 14px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.04);
  --r:9px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Geist',sans-serif;min-height:100vh;display:flex;overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased;}

/* SIDEBAR */
.sidebar{width:224px;min-width:224px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto;}
.sidebar-header{padding:16px 14px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.logo-icon{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:10px;font-weight:600;color:#fff;flex-shrink:0;}
.logo-text{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.3px;}
.logo-text span{color:var(--text3);font-weight:400;}
.sb-section{padding:12px 10px 4px;}
.sb-title{font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);font-family:'Geist Mono',monospace;padding:0 5px;margin-bottom:3px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer;border-radius:7px;transition:background .1s;font-size:13px;color:var(--text2);user-select:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent-s);color:var(--accent);font-weight:500;}
.project-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.nav-count{font-size:10.5px;background:var(--surface2);color:var(--text3);padding:1px 6px;border-radius:20px;font-family:'Geist Mono',monospace;font-weight:600;}
.nav-item.active .nav-count{background:var(--accent);color:#fff;}
.nav-del{background:none;border:none;color:transparent;cursor:pointer;font-size:10px;padding:2px 4px;border-radius:4px;line-height:1;flex-shrink:0;margin-left:auto;transition:color .1s,background .1s;}
.nav-item:hover .nav-del{color:var(--text3);}
.nav-del:hover{color:var(--red)!important;background:var(--red-s);}
.sb-footer{margin-top:auto;padding:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.sb-btn{width:100%;padding:7px 10px;background:transparent;border:1.5px dashed var(--border2);border-radius:7px;color:var(--text3);font-size:12.5px;cursor:pointer;text-align:left;font-family:'Geist',sans-serif;transition:all .1s;display:flex;align-items:center;gap:7px;}
.sb-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-s);}
.ei-row{display:flex;gap:5px;}
.icon-btn{flex:1;padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text3);font-size:11.5px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .1s;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:500;}
.icon-btn:hover{background:var(--border);color:var(--text2);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh;}
.topbar{padding:0 22px;height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--surface);flex-shrink:0;}
.proj-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;letter-spacing:-0.3px;color:var(--text);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.tab-bar{display:flex;gap:2px;background:var(--surface2);border-radius:8px;padding:3px;}
.tab-btn{padding:4px 12px;border-radius:5px;border:none;background:transparent;color:var(--text3);font-size:12.5px;cursor:pointer;font-family:'Geist',sans-serif;font-weight:500;transition:all .1s;}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow);}
.tab-btn:hover:not(.active){color:var(--text2);}
.content{flex:1;overflow-y:auto;padding:22px;}

/* STATS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);}
.stat-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;font-family:'Geist Mono',monospace;margin-bottom:5px;}
.stat-value{font-size:24px;font-weight:600;font-family:'Geist Mono',monospace;letter-spacing:-1px;}
.stat-value.ca{color:var(--accent);}.stat-value.cr{color:var(--red);}.stat-value.cg{color:var(--green);}
.sec-label{font-size:9.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);font-family:'Geist Mono',monospace;margin-bottom:9px;margin-top:2px;}

/* PROJECT CARDS */
.proj-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-bottom:22px;}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;cursor:pointer;box-shadow:var(--shadow);transition:box-shadow .15s,transform .15s,border-color .15s;display:flex;flex-direction:column;gap:13px;}
.proj-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:var(--border2);}
.pc-header{display:flex;align-items:center;gap:9px;}
.pc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pc-name{font-weight:600;font-size:13.5px;letter-spacing:-0.2px;color:var(--text);flex:1;}
.pc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.pc-si{display:flex;flex-direction:column;gap:2px;}
.pc-sl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-family:'Geist Mono',monospace;}
.pc-sv{font-size:15px;font-weight:600;font-family:'Geist Mono',monospace;letter-spacing:-0.5px;}
.pc-foot{display:flex;flex-direction:column;gap:5px;}
.prog-meta{display:flex;justify-content:space-between;align-items:center;}
.prog-pct{font-size:10.5px;font-family:'Geist Mono',monospace;font-weight:600;color:var(--text2);}
.prog-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease;}

/* NOTES */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.note-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;box-shadow:var(--shadow);transition:box-shadow .15s,border-color .15s;display:flex;flex-direction:column;}
.note-card:hover{box-shadow:var(--shadow-md);border-color:var(--border2);}
.note-card:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s);}
.note-ptag{font-size:9.5px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;font-weight:600;}
.note-title{font-weight:600;font-size:13.5px;outline:none;background:transparent;border:none;color:var(--text);width:100%;font-family:'Geist',sans-serif;letter-spacing:-0.2px;margin-bottom:5px;}
.note-title::placeholder{color:var(--text3);font-weight:400;}
.note-body{font-size:13px;line-height:1.65;color:var(--text2);outline:none;background:transparent;border:none;width:100%;resize:none;min-height:36px;overflow:hidden;font-family:'Geist',sans-serif;flex:1;field-sizing:content;word-break:break-word;overflow-wrap:break-word;}
.note-body::placeholder{color:var(--text3);}
.note-body:focus{color:var(--text);}
.note-imgs{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.note-img-wrap{position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.note-img-wrap img{width:100%;display:block;border-radius:5px;}
.note-img-del{position:absolute;top:4px;right:4px;background:rgba(24,24,31,.55);border:none;color:#fff;cursor:pointer;font-size:11px;padding:2px 5px;border-radius:4px;line-height:1.4;backdrop-filter:blur(4px);transition:background .12s;}
.note-img-del:hover{background:rgba(232,68,90,.85);}
.note-footer{display:flex;align-items:center;justify-content:space-between;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.note-date{font-size:10.5px;color:var(--text3);font-family:'Geist Mono',monospace;}
.note-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:3px 5px;border-radius:4px;transition:color .1s,background .1s;line-height:1;}
.note-del:hover{color:var(--red);background:var(--red-s);}

/* ADD CARD */
.add-card{background:transparent;border:1.5px dashed var(--border2);border-radius:var(--r);padding:16px;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--text3);cursor:pointer;font-size:13px;transition:all .12s;min-height:100px;}
.add-card:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-s);}

/* TASKS */
.tasks-wrap{max-width:700px;}
.task-item{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;box-shadow:var(--shadow);transition:box-shadow .12s,border-color .12s;}
.task-item:hover{box-shadow:var(--shadow-md);}
.task-item:focus-within{border-color:var(--accent);}
.task-item.done{opacity:.5;box-shadow:none;}
.task-item.done .task-text{text-decoration:line-through;color:var(--text3);}
.task-check{width:17px;height:17px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;background:transparent;margin-top:2px;}
.task-check:hover{border-color:var(--green);}
.task-item.done .task-check{background:var(--green);border-color:var(--green);}
.task-check-icon{display:none;font-size:9px;color:#fff;line-height:1;}
.task-item.done .task-check-icon{display:block;}
.task-ptag{font-size:9.5px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.5px;font-weight:600;white-space:nowrap;padding:2px 6px;border-radius:20px;flex-shrink:0;margin-top:2px;}
.task-text{flex:1;font-size:13px;outline:none;background:transparent;border:none;color:var(--text);font-family:'Geist',sans-serif;white-space:pre-wrap;word-break:break-word;resize:none;overflow:hidden;line-height:1.55;min-height:20px;field-sizing:content;padding:0;}
.task-text::placeholder{color:var(--text3);}
.task-right{display:flex;align-items:center;gap:5px;flex-shrink:0;margin-top:2px;}
.pri-badge{font-size:9.5px;padding:2px 7px;border-radius:20px;font-family:'Geist Mono',monospace;font-weight:600;letter-spacing:.3px;white-space:nowrap;}
.p-high{background:var(--red-s);color:var(--red);}
.p-mid{background:var(--amber-s);color:var(--amber);}
.p-low{background:var(--green-s);color:var(--green);}
.task-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;opacity:0;transition:opacity .12s,color .12s;padding:3px 4px;border-radius:4px;flex-shrink:0;}
.task-item:hover .task-del{opacity:1;}
.task-del:hover{color:var(--red);background:var(--red-s);}
.add-task-row{display:flex;gap:7px;margin-top:9px;}
.add-task-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:'Geist',sans-serif;outline:none;box-shadow:var(--shadow);transition:border-color .12s,box-shadow .12s;}
.add-task-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s);}
.add-task-inp::placeholder{color:var(--text3);}
.pri-sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 9px;color:var(--text2);font-size:12.5px;font-family:'Geist',sans-serif;outline:none;cursor:pointer;box-shadow:var(--shadow);}
.add-btn{background:var(--accent);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Geist',sans-serif;transition:opacity .12s,transform .1s;white-space:nowrap;}
.add-btn:hover{opacity:.88;}
.add-btn:active{transform:scale(.97);}
.done-div{display:flex;align-items:center;gap:10px;margin:16px 0 9px;}
.done-div span{font-size:9.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);font-family:'Geist Mono',monospace;white-space:nowrap;}
.done-div hr{flex:1;border:none;border-top:1px solid var(--border);}

/* SNIPPETS */
.snip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.snip-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;transition:box-shadow .15s,border-color .15s;overflow:hidden;}
.snip-card:hover{box-shadow:var(--shadow-md);border-color:var(--border2);}
.snip-header{display:flex;align-items:center;gap:6px;padding:10px 12px 9px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.snip-title{font-weight:600;font-size:13px;outline:none;background:transparent;border:none;color:var(--text);font-family:'Geist',sans-serif;letter-spacing:-0.2px;min-width:0;flex:1;}
.snip-title::placeholder{color:var(--text3);font-weight:400;}
.snip-lang{font-size:10px;font-family:'Geist Mono',monospace;background:var(--surface2);color:var(--text3);padding:2px 7px;border-radius:5px;font-weight:500;border:1px solid var(--border);cursor:pointer;outline:none;flex-shrink:0;}
.snip-copy{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:3px 6px;border-radius:4px;transition:all .1s;white-space:nowrap;font-family:'Geist Mono',monospace;flex-shrink:0;}
.snip-copy:hover{background:var(--surface2);color:var(--text2);}
.snip-copy.copied{color:var(--green);}
.snip-del{background:none;border:none;color:transparent;cursor:pointer;font-size:11px;padding:3px 4px;border-radius:4px;transition:all .1s;flex-shrink:0;}
.snip-card:hover .snip-del{color:var(--text3);}
.snip-del:hover{color:var(--red)!important;background:var(--red-s);}
.snip-code{font-family:'Geist Mono',monospace;font-size:12px;line-height:1.6;color:var(--text2);background:#fafaf8;padding:12px 13px;border:none;outline:none;width:100%;resize:none;min-height:80px;overflow:hidden;field-sizing:content;tab-size:2;word-break:break-word;}
.snip-code::placeholder{color:var(--text3);}
.snip-code:focus{color:var(--text);background:#f8f8f5;}
.snip-foot{padding:7px 13px;border-top:1px solid var(--border);}
.snip-ptag{font-size:9.5px;font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:1px;font-weight:600;}

/* FILES TAB */
.files-wrap{max-width:680px;}
.files-section-title{font-size:9.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3);font-family:'Geist Mono',monospace;margin-bottom:8px;margin-top:18px;}
.files-section-title:first-child{margin-top:0;}
.file-item{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;box-shadow:var(--shadow);transition:box-shadow .12s,border-color .12s;}
.file-item:hover{box-shadow:var(--shadow-md);border-color:var(--border2);}
.file-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.file-icon.link{background:var(--accent-s);color:var(--accent);}
.file-icon.file{background:var(--green-s);color:var(--green);}
.file-info{flex:1;min-width:0;}
.file-name{font-weight:600;font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.file-sub{font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-actions{display:flex;gap:5px;flex-shrink:0;}
.file-open-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text2);font-size:11.5px;cursor:pointer;font-family:'Geist',sans-serif;font-weight:500;transition:all .1s;white-space:nowrap;}
.file-open-btn:hover{background:var(--accent-s);border-color:var(--accent);color:var(--accent);}
.file-del-btn{background:none;border:none;color:transparent;cursor:pointer;font-size:11px;padding:4px 5px;border-radius:5px;transition:all .1s;flex-shrink:0;}
.file-item:hover .file-del-btn{color:var(--text3);}
.file-del-btn:hover{color:var(--red)!important;background:var(--red-s);}
.files-add-row{display:flex;gap:7px;margin-top:10px;}
.files-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:'Geist',sans-serif;outline:none;box-shadow:var(--shadow);transition:border-color .12s;}
.files-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s);}
.files-inp::placeholder{color:var(--text3);}
.files-upload-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 13px;color:var(--text2);font-size:12.5px;font-family:'Geist',sans-serif;cursor:pointer;transition:all .1s;display:flex;align-items:center;gap:6px;white-space:nowrap;font-weight:500;}
.files-upload-btn:hover{background:var(--green-s);border-color:var(--green);color:var(--green);}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty .icon{font-size:32px;margin-bottom:10px;opacity:.4;}
.empty p{font-size:13.5px;line-height:1.65;}

/* ── INTERNAL DIALOG (replaces confirm/alert) ── */
.dialog-overlay{position:fixed;inset:0;background:rgba(18,18,28,.32);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .15s;}
.dialog-overlay.open{opacity:1;pointer-events:all;}
.dialog-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 24px;width:360px;max-width:calc(100vw - 40px);box-shadow:var(--shadow-md);transform:scale(.96) translateY(6px);transition:transform .15s;}
.dialog-overlay.open .dialog-box{transform:scale(1) translateY(0);}
.dialog-title{font-size:14px;font-weight:600;margin-bottom:8px;letter-spacing:-0.2px;}
.dialog-msg{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:18px;}
.dialog-actions{display:flex;gap:8px;justify-content:flex-end;}
.dialog-cancel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text2);font-size:13px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .1s;}
.dialog-cancel:hover{background:var(--border);color:var(--text);}
.dialog-confirm{border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Geist',sans-serif;transition:opacity .1s;}
.dialog-confirm.danger{background:var(--red);color:#fff;}
.dialog-confirm.safe{background:var(--accent);color:#fff;}
.dialog-confirm:hover{opacity:.85;}

/* MODAL (new project) */
.modal-overlay{position:fixed;inset:0;background:rgba(18,18,28,.35);display:flex;align-items:center;justify-content:center;z-index:150;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .16s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;width:350px;box-shadow:var(--shadow-md);transform:scale(.96) translateY(6px);transition:transform .16s;}
.modal-overlay.open .modal{transform:scale(1) translateY(0);}
.modal h3{font-size:14px;font-weight:600;margin-bottom:13px;letter-spacing:-0.2px;}
.m-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;font-family:'Geist',sans-serif;outline:none;margin-bottom:11px;transition:border-color .12s,box-shadow .12s;}
.m-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s);}
.m-inp::placeholder{color:var(--text3);}
.col-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;font-family:'Geist Mono',monospace;}
.col-opts{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;}
.col-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .12s;}
.col-dot.sel{border-color:var(--text);transform:scale(1.15);}
.m-actions{display:flex;gap:7px;justify-content:flex-end;}
.m-cancel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--text2);font-size:12.5px;cursor:pointer;font-family:'Geist',sans-serif;transition:all .1s;}
.m-cancel:hover{background:var(--border);color:var(--text);}

/* FILE ADD MODAL */
.fm-tabs{display:flex;gap:4px;margin-bottom:2px;}
.fm-tab{flex:1;padding:6px 8px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:11.5px;font-family:'Geist',sans-serif;font-weight:500;cursor:pointer;transition:all .1s;text-align:center;}
.fm-tab:hover{background:var(--border);color:var(--text2);}
.fm-tab.active{background:var(--accent-s);border-color:var(--accent);color:var(--accent);font-weight:600;}
.fm-dropzone{border:1.5px dashed var(--border2);border-radius:8px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);cursor:pointer;font-size:12.5px;transition:all .12s;}
.fm-dropzone:hover,.fm-dropzone.drag{border-color:var(--accent);color:var(--accent);background:var(--accent-s);}
.fm-dropzone.has-file{border-color:var(--green);color:var(--green);background:var(--green-s);}
.fmodal-row{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.fmodal-row label{font-size:11px;color:var(--text3);font-family:'Geist Mono',monospace;text-transform:uppercase;letter-spacing:.8px;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">FI</div>
    <div class="logo-text">FIAE<span> Board</span></div>
  </div>
  <div class="sb-section">
    <div class="sb-title">Navigation</div>
    <div class="nav-item active" id="nav-__all__">
      <svg width="12" height="12" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".7"/></svg>
      Alle Projekte
      <span class="nav-count" id="count-__all__" style="display:none">0</span>
    </div>
  </div>
  <div class="sb-section" style="flex:1">
    <div class="sb-title">Projekte</div>
    <div id="project-list"></div>
  </div>
  <div class="sb-footer">
    <button class="sb-btn" onclick="openProjectModal()">
      <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      Neues Projekt
    </button>
    <div class="ei-row">
      <button class="icon-btn" onclick="exportData()">
        <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Export
      </button>
      <button class="icon-btn" onclick="document.getElementById('imp-file').click()">
        <svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 9V1M4 4l3-3 3 3M2 11h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>Import
      </button>
      <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="proj-title" id="proj-title">
      <svg width="13" height="13" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/></svg>
      Alle Projekte
    </div>
    <div class="topbar-right">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('overview')" id="tab-overview">Übersicht</button>
        <button class="tab-btn" onclick="switchTab('notes')" id="tab-notes">Notizen</button>
        <button class="tab-btn" onclick="switchTab('tasks')" id="tab-tasks">Aufgaben</button>
        <button class="tab-btn" onclick="switchTab('snippets')" id="tab-snippets">Snippets</button>
        <button class="tab-btn" onclick="switchTab('files')" id="tab-files">Dateien</button>
      </div>
    </div>
  </div>
  <div class="content" id="content-area"></div>
</main>

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="proj-modal">
  <div class="modal">
    <h3>Neues Projekt anlegen</h3>
    <input type="text" class="m-inp" id="proj-name-inp" placeholder="z. B. Betrieb, Prüfung, Schule…" maxlength="40">
    <div class="col-label">Farbe wählen</div>
    <div class="col-opts" id="col-opts"></div>
    <div class="m-actions">
      <button class="m-cancel" onclick="closeProjectModal()">Abbrechen</button>
      <button class="add-btn" onclick="createProject()">Erstellen</button>
    </div>
  </div>
</div>

<!-- FILE ADD MODAL -->
<div class="modal-overlay" id="file-modal">
  <div class="modal" style="width:400px">
    <h3>Datei / Link hinzufügen</h3>
    <div class="fm-tabs">
      <button class="fm-tab active" id="fmt-link"   onclick="setFmTab('link')">&#x1F517; Web-Link</button>
      <button class="fm-tab"        id="fmt-path"   onclick="setFmTab('path')">&#x1F4C1; Pfad-Shortcut</button>
      <button class="fm-tab"        id="fmt-upload" onclick="setFmTab('upload')">⬆ Hochladen</button>
    </div>
    <div class="fmodal-row" style="margin-top:12px">
      <label>Titel / Beschreibung</label>
      <input type="text" class="m-inp" id="fm-title" placeholder="z. B. Confluence, Skript…" maxlength="80" style="margin-bottom:0">
    </div>
    <div class="fmodal-row" id="fm-link-row">
      <label>URL</label>
      <input type="text" class="m-inp" id="fm-url" placeholder="https://…" style="margin-bottom:0">
    </div>
    <div class="fmodal-row" id="fm-path-row" style="display:none">
      <label>Lokaler Pfad</label>
      <input type="text" class="m-inp" id="fm-path" placeholder="C:\Users\Du\Dokumente\datei.pdf" style="margin-bottom:0">
      <div style="font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5">In Firefox öffnet der Pfad direkt. In Chrome muss er manuell kopiert werden.</div>
    </div>
    <div id="fm-upload-row" style="display:none;margin-top:8px">
      <div class="fm-dropzone" id="fm-dropzone" onclick="document.getElementById('fm-file-inp').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 0L8 7m4-4l4 4"/><path d="M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/></svg>
        <span id="fm-drop-label">Klicken oder Datei hierher ziehen</span>
      </div>
      <input type="file" id="fm-file-inp" style="display:none">
      <div style="font-size:11px;color:var(--text3);margin-top:5px">Wird als Base64 gespeichert. Max. ~4 MB empfohlen.</div>
    </div>
    <div class="m-actions" style="margin-top:14px">
      <button class="m-cancel" onclick="closeFileModal()">Abbrechen</button>
      <button class="add-btn" onclick="confirmFileModal()">Hinzufügen</button>
    </div>
  </div>
</div>

<!-- INTERNAL DIALOG -->
<div class="dialog-overlay" id="dialog-overlay">
  <div class="dialog-box">
    <div class="dialog-title" id="dialog-title"></div>
    <div class="dialog-msg" id="dialog-msg"></div>
    <div class="dialog-actions">
      <button class="dialog-cancel" id="dialog-cancel">Abbrechen</button>
      <button class="dialog-confirm" id="dialog-confirm">OK</button>
    </div>
  </div>
</div>


<script>
const COLORS=['#5b4fff','#e8445a','#1b9e6e','#d97706','#0ea5e9','#9333ea','#db2777','#16a34a'];
const LANGS=['JS','TS','Python','Java','C#','SQL','HTML','CSS','Bash','PHP','JSON','XML','Andere'];

let state=JSON.parse(localStorage.getItem('fiae_v4')||'null')||{projects:[],notes:{},tasks:{},snippets:{},files:{},selColor:COLORS[0]};

// Migrate
if(!localStorage.getItem('fiae_v4')&&localStorage.getItem('fiae_v3')){
  try{const o=JSON.parse(localStorage.getItem('fiae_v3'));state={...o,files:{}};state.projects.forEach(p=>{state.files[p.id]=[];});save();}catch(e){}
}
state.projects.forEach(p=>{
  if(!state.snippets[p.id])state.snippets[p.id]=[];
  if(!state.files[p.id])state.files[p.id]=[];
});
Object.values(state.notes).forEach(arr=>arr.forEach(n=>{if(!n.images)n.images=[];}));

let curProject='__all__', curTab='overview', saveTimer=null;
let _fmMode='link', _fmPid='', _fmFileData=null, _fmFileName='';

function save(){localStorage.setItem('fiae_v4',JSON.stringify(state));}
function debounceSave(){clearTimeout(saveTimer);saveTimer=setTimeout(save,400);}

// ── INTERNAL DIALOG ──
let _dlgResolve=null;
function dialog(title, msg, confirmLabel='OK', danger=true){
  return new Promise(resolve=>{
    _dlgResolve=resolve;
    document.getElementById('dialog-title').textContent=title;
    document.getElementById('dialog-msg').textContent=msg;
    const cb=document.getElementById('dialog-confirm');
    cb.textContent=confirmLabel;
    cb.className='dialog-confirm '+(danger?'danger':'safe');
    const cancel=document.getElementById('dialog-cancel');
    cancel.style.display='';
    document.getElementById('dialog-overlay').classList.add('open');
  });
}
function alert2(title, msg){
  return new Promise(resolve=>{
    _dlgResolve=resolve;
    document.getElementById('dialog-title').textContent=title;
    document.getElementById('dialog-msg').textContent=msg;
    const cb=document.getElementById('dialog-confirm');
    cb.textContent='OK';cb.className='dialog-confirm safe';
    document.getElementById('dialog-cancel').style.display='none';
    document.getElementById('dialog-overlay').classList.add('open');
  });
}
function closeDlg(val){
  document.getElementById('dialog-overlay').classList.remove('open');
  if(_dlgResolve){_dlgResolve(val);_dlgResolve=null;}
}
document.getElementById('dialog-confirm').addEventListener('click',()=>closeDlg(true));
document.getElementById('dialog-cancel').addEventListener('click',()=>closeDlg(false));
document.getElementById('dialog-overlay').addEventListener('click',e=>{if(e.target.id==='dialog-overlay')closeDlg(false);});

// ── EXPORT / IMPORT ──
function exportData(){
  const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='fiae_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
async function importData(e){
  const file=e.target.files[0];if(!file)return;
  const ok=await dialog('Import','Bestehende Daten werden überschrieben. Fortfahren?','Importieren',false);
  if(!ok){e.target.value='';return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);if(!d.projects)throw new Error();
      state=d;
      if(!state.snippets){state.snippets={};state.projects.forEach(p=>state.snippets[p.id]=[]);}
      if(!state.files){state.files={};state.projects.forEach(p=>state.files[p.id]=[]);}
      Object.values(state.notes).forEach(arr=>arr.forEach(n=>{if(!n.images)n.images=[];}));
      save();curProject='__all__';curTab='overview';renderSidebar();renderContent();
    }catch{alert2('Fehler','Import fehlgeschlagen. Bitte eine gültige FIAE-Backup-Datei wählen.');}
  };
  reader.readAsText(file);e.target.value='';
}

// ── SIDEBAR ──
function renderSidebar(){
  const list=document.getElementById('project-list');list.innerHTML='';
  const allNav=document.getElementById('nav-__all__');
  allNav.className='nav-item'+(curProject==='__all__'?' active':'');
  allNav.onclick=()=>selectProject('__all__');
  state.projects.forEach(p=>{
    const open=(state.tasks[p.id]||[]).filter(t=>!t.done).length;
    const el=document.createElement('div');
    el.className='nav-item'+(curProject===p.id?' active':'');el.id='nav-'+p.id;
    el.innerHTML='<div class="project-dot" style="background:'+p.color+'"></div>'+
      '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</span>'+
      (open>0?'<span class="nav-count" style="margin-left:auto">'+open+'</span>':'')+
      '<button class="nav-del" title="Projekt löschen">&#x2715;</button>';
    el.addEventListener('click',function(e){if(e.target.closest('.nav-del'))delProject(p.id);else selectProject(p.id);});
    list.appendChild(el);
  });
  const total=state.projects.reduce((s,p)=>s+(state.tasks[p.id]||[]).filter(t=>!t.done).length,0);
  const ce=document.getElementById('count-__all__');ce.textContent=total;ce.style.display=total>0?'':'none';
}

function selectProject(id){
  curProject=id;
  const p=id==='__all__'?null:state.projects.find(x=>x.id===id);
  document.getElementById('proj-title').innerHTML=p
    ?'<div class="project-dot" style="background:'+p.color+';width:8px;height:8px;border-radius:50%"></div>'+esc(p.name)
    :'<svg width="13" height="13" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="#5b4fff"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="#5b4fff" opacity=".7"/></svg> Alle Projekte';
  switchTab('overview');renderSidebar();
}

// ── PROJECT MODAL ──
function openProjectModal(){
  const opts=document.getElementById('col-opts');opts.innerHTML='';state.selColor=COLORS[0];
  COLORS.forEach(c=>{const d=document.createElement('div');d.className='col-dot'+(c===state.selColor?' sel':'');d.style.background=c;d.onclick=()=>{state.selColor=c;document.querySelectorAll('.col-dot').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};opts.appendChild(d);});
  document.getElementById('proj-name-inp').value='';
  document.getElementById('proj-modal').classList.add('open');
  setTimeout(()=>document.getElementById('proj-name-inp').focus(),100);
}
function closeProjectModal(){document.getElementById('proj-modal').classList.remove('open');}
function createProject(){
  const name=document.getElementById('proj-name-inp').value.trim();if(!name)return;
  const id='p_'+Date.now();
  state.projects.push({id,name,color:state.selColor});
  state.notes[id]=[];state.tasks[id]=[];state.snippets[id]=[];state.files[id]=[];
  save();closeProjectModal();renderSidebar();selectProject(id);
}
async function delProject(id){
  const p=state.projects.find(x=>x.id===id);if(!p)return;
  const ok=await dialog('Projekt löschen','Projekt "'+p.name+'" wirklich löschen? Alle Notizen, Aufgaben, Snippets und Dateien gehen verloren.','Löschen');
  if(!ok)return;
  state.projects=state.projects.filter(x=>x.id!==id);
  delete state.notes[id];delete state.tasks[id];delete state.snippets[id];delete state.files[id];
  save();if(curProject===id)selectProject('__all__');else{renderSidebar();renderContent();}
}
document.getElementById('proj-name-inp').addEventListener('keydown',e=>{if(e.key==='Enter')createProject();if(e.key==='Escape')closeProjectModal();});
document.getElementById('proj-modal').addEventListener('click',e=>{if(e.target.id==='proj-modal')closeProjectModal();});
document.getElementById('file-modal').addEventListener('click',e=>{if(e.target.id==='file-modal')closeFileModal();});

// ── FILE MODAL ──
function openFileModal(pid){
  _fmPid=pid;_fmFileData=null;_fmFileName='';
  document.getElementById('fm-title').value='';
  document.getElementById('fm-url').value='';
  document.getElementById('fm-path').value='';
  document.getElementById('fm-drop-label').textContent='Klicken oder Datei hierher ziehen';
  document.getElementById('fm-dropzone').className='fm-dropzone';
  document.getElementById('file-modal').classList.add('open');
  setFmTab('link');
  setTimeout(()=>document.getElementById('fm-title').focus(),100);
}
function setFmTab(mode){
  _fmMode=mode;
  ['link','path','upload'].forEach(t=>{
    document.getElementById('fmt-'+t).classList.toggle('active',t===mode);
    const row=document.getElementById('fm-'+t+'-row');
    if(row)row.style.display=t===mode?'':'none';
  });
}
function closeFileModal(){document.getElementById('file-modal').classList.remove('open');}
function confirmFileModal(){
  const title=document.getElementById('fm-title').value.trim();
  if(!title){document.getElementById('fm-title').focus();return;}
  if(_fmMode==='link'){
    let url=document.getElementById('fm-url').value.trim();
    if(!url){document.getElementById('fm-url').focus();return;}
    if(!/^https?:\/\//i.test(url))url='https://'+url;
    addFileEntry(_fmPid,{id:'f_'+Date.now(),type:'link',title,url,created:Date.now()});
    closeFileModal();
  } else if(_fmMode==='path'){
    let path=document.getElementById('fm-path').value.trim();
    if(!path){document.getElementById('fm-path').focus();return;}
    // Normalise to file:// URL
    let fileUrl=path;
    if(!path.startsWith('file://')){
      // Windows backslashes -> forward
      fileUrl='file:///'+path.replace(/\\/g,'/');
    }
    addFileEntry(_fmPid,{id:'f_'+Date.now(),type:'path',title,url:fileUrl,path,created:Date.now()});
    closeFileModal();
  } else if(_fmMode==='upload'){
    if(!_fmFileData){alert2('Keine Datei','Bitte zuerst eine Datei auswählen.');return;}
    addFileEntry(_fmPid,{id:'f_'+Date.now(),type:'upload',title,filename:_fmFileName,data:_fmFileData,created:Date.now()});
    _fmFileData=null;_fmFileName='';
    closeFileModal();
  }
}
// file input for upload tab — wired after DOM ready
function wireFileModal(){
  const inp=document.getElementById('fm-file-inp');
  const dz=document.getElementById('fm-dropzone');
  if(!inp||!dz)return;
  inp.addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;readUploadFile(file);});
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');const file=e.dataTransfer.files[0];if(!file)return;readUploadFile(file);});
}
function readUploadFile(file){
  _fmFileName=file.name;
  if(!document.getElementById('fm-title').value.trim()){
    document.getElementById('fm-title').value=file.name;
  }
  const reader=new FileReader();
  reader.onload=ev=>{
    _fmFileData=ev.target.result;
    const label=file.name+' ('+formatSize(file.size)+')';
    document.getElementById('fm-drop-label').textContent=label;
    document.getElementById('fm-dropzone').className='fm-dropzone has-file';
  };
  reader.readAsDataURL(file);
}
function addFileEntry(pid,entry){
  if(!state.files[pid])state.files[pid]=[];
  state.files[pid].unshift(entry);save();renderContent();
}



// ── TABS ──
function switchTab(tab){
  curTab=tab;
  ['overview','notes','tasks','snippets','files'].forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.classList.toggle('active',t===tab);});
  renderContent();
}
function renderContent(){
  const area=document.getElementById('content-area');
  if(curTab==='overview')renderOverview(area);
  else if(curTab==='notes')renderNotes(area);
  else if(curTab==='tasks')renderTasks(area);
  else if(curTab==='snippets')renderSnippets(area);
  else renderFiles(area);
}

// ── OVERVIEW ──
function renderOverview(area){
  const projects=curProject==='__all__'?state.projects:state.projects.filter(p=>p.id===curProject);
  let tNotes=0,tOpen=0,tDone=0,tSnippets=0;
  projects.forEach(p=>{
    tNotes+=(state.notes[p.id]||[]).length;
    tSnippets+=(state.snippets[p.id]||[]).length;
    (state.tasks[p.id]||[]).forEach(t=>t.done?tDone++:tOpen++);
  });
  let html='<div class="stat-row">'+
    '<div class="stat-card"><div class="stat-label">Projekte</div><div class="stat-value ca">'+projects.length+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Aufgaben offen</div><div class="stat-value cr">'+tOpen+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Erledigt</div><div class="stat-value cg">'+tDone+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Snippets</div><div class="stat-value">'+tSnippets+'</div></div>'+
    '</div>';
  if(curProject==='__all__'){
    if(!state.projects.length){html+='<div class="empty"><div class="icon">&#128193;</div><p>Noch keine Projekte.<br>Erstelle dein erstes Projekt in der Seitenleiste.</p></div>';}
    else{
      html+='<div class="sec-label">Projekte</div><div class="proj-cards">';
      projects.forEach(p=>{
        const tasks=(state.tasks[p.id]||[]),open=tasks.filter(t=>!t.done).length,done=tasks.filter(t=>t.done).length,total=tasks.length,pct=total>0?Math.round(done/total*100):0;
        html+='<div class="proj-card" onclick="selectProject(\''+p.id+'\')">'+
          '<div class="pc-header"><div class="pc-dot" style="background:'+p.color+'"></div><div class="pc-name">'+esc(p.name)+'</div></div>'+
          '<div class="pc-stats">'+
            '<div class="pc-si"><span class="pc-sl">Notizen</span><span class="pc-sv">'+((state.notes[p.id]||[]).length)+'</span></div>'+
            '<div class="pc-si"><span class="pc-sl">Offen</span><span class="pc-sv" style="color:var(--red)">'+open+'</span></div>'+
            '<div class="pc-si"><span class="pc-sl">Erledigt</span><span class="pc-sv" style="color:var(--green)">'+done+'</span></div>'+
          '</div>'+
          (total>0?'<div class="pc-foot"><div class="prog-meta"><span class="pc-sl">Fortschritt</span><span class="prog-pct">'+pct+'%</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+p.color+'"></div></div></div>':'')+
          '</div>';
      });
      html+='</div>';
      const allOpen=[];
      projects.forEach(p=>(state.tasks[p.id]||[]).filter(t=>!t.done).forEach(t=>allOpen.push({...t,_pName:p.name,_pColor:p.color})));
      if(allOpen.length){html+='<div class="sec-label" style="margin-top:6px">Offene Aufgaben</div><div class="tasks-wrap">';allOpen.slice(0,6).forEach(t=>html+=taskHTML(t,true));html+='</div>';}
    }
  } else {
    const p=state.projects.find(x=>x.id===curProject);if(!p)return;
    const notes=(state.notes[p.id]||[]),open=(state.tasks[p.id]||[]).filter(t=>!t.done),snips=(state.snippets[p.id]||[]),files=(state.files[p.id]||[]);
    if(!notes.length&&!open.length&&!snips.length&&!files.length){html+='<div class="empty"><div class="icon">&#10024;</div><p>Noch nichts hier.<br>Füge Notizen, Aufgaben, Snippets oder Dateien hinzu.</p></div>';}
    else{
      if(open.length){html+='<div class="sec-label">Offene Aufgaben</div><div class="tasks-wrap">';open.slice(0,5).forEach(t=>html+=taskHTML(t,false));html+='</div>';}
      if(notes.length){html+='<div class="sec-label" style="margin-top:'+(open.length?22:0)+'px">Letzte Notizen</div><div class="notes-grid">';notes.slice(0,3).forEach(n=>html+=noteCardHTML(n,null));html+='</div>';}
      if(files.length){html+='<div class="sec-label" style="margin-top:22px">Dateien &amp; Links</div><div class="files-wrap">';files.slice(0,4).forEach(f=>html+=fileItemHTML(f,p.id));html+='</div>';}
    }
  }
  area.innerHTML=html;attachListeners();autoResizeAll();
}

// ── NOTES ──
function renderNotes(area){
  const projects=curProject==='__all__'?state.projects:state.projects.filter(p=>p.id===curProject);
  if(projects.every(p=>!(state.notes[p.id]||[]).length)&&curProject==='__all__'){area.innerHTML='<div class="empty"><div class="icon">&#128221;</div><p>Noch keine Notizen.<br>Wähle ein Projekt aus.</p></div>';return;}
  let html='<div class="notes-grid">';
  projects.forEach(p=>(state.notes[p.id]||[]).forEach(n=>html+=noteCardHTML(n,projects.length>1?{name:p.name,color:p.color}:null)));
  if(curProject!=='__all__')html+='<div class="add-card" onclick="addNote(\''+curProject+'\')"><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Neue Notiz</div>';
  html+='</div>';area.innerHTML=html;attachListeners();autoResizeAll();
}
function noteCardHTML(n,project){
  const d=new Date(n.created),date=String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getFullYear()).slice(-2);
  const imgs=(n.images||[]);
  const imgsHTML=imgs.length?'<div class="note-imgs">'+imgs.map((img,i)=>'<div class="note-img-wrap"><img src="'+img+'" alt="Screenshot"><button class="note-img-del" onclick="delNoteImg(\''+n.projectId+'\',\''+n.id+'\','+i+')">&#x2715;</button></div>').join('')+'</div>':'';
  return '<div class="note-card" data-note-id="'+n.id+'" data-project-id="'+n.projectId+'">'+
    (project?'<div class="note-ptag" style="color:'+project.color+'">'+esc(project.name)+'</div>':'')+
    '<input class="note-title" data-field="title" value="'+esc(n.title)+'" placeholder="Titel…" maxlength="80">'+
    '<textarea class="note-body" data-field="body" placeholder="Notiz…">'+esc(n.body)+'</textarea>'+
    imgsHTML+
    '<div class="note-footer"><span class="note-date">'+date+'</span><button class="note-del" onclick="delNote(\''+n.projectId+'\',\''+n.id+'\')">&#x2715;</button></div>'+
    '</div>';
}
function addNote(pid){
  const id='n_'+Date.now();if(!state.notes[pid])state.notes[pid]=[];
  state.notes[pid].unshift({id,projectId:pid,title:'',body:'',images:[],created:Date.now()});
  save();renderContent();setTimeout(()=>{document.querySelector('[data-note-id="'+id+'"] .note-title')?.focus();autoResizeAll();},50);
}
async function delNote(pid,nid){
  const ok=await dialog('Notiz löschen','Diese Notiz wirklich löschen?','Löschen');
  if(!ok)return;
  state.notes[pid]=(state.notes[pid]||[]).filter(n=>n.id!==nid);save();renderContent();
}
function delNoteImg(pid,nid,idx){
  const note=(state.notes[pid]||[]).find(n=>n.id===nid);if(!note)return;
  note.images.splice(idx,1);save();renderContent();
}

// ── TASKS ──
function renderTasks(area){
  const projects=curProject==='__all__'?state.projects:state.projects.filter(p=>p.id===curProject);
  const showP=projects.length>1;let open=[],done=[];
  projects.forEach(p=>(state.tasks[p.id]||[]).forEach(t=>{const e={...t,_pName:p.name,_pColor:p.color};t.done?done.push(e):open.push(e);}));
  if(!open.length&&curProject==='__all__'&&state.projects.length){area.innerHTML='<div class="empty"><div class="icon">&#9989;</div><p>Alle Aufgaben erledigt!</p></div>';return;}
  if(!state.projects.length){area.innerHTML='<div class="empty"><div class="icon">&#128203;</div><p>Noch keine Projekte angelegt.</p></div>';return;}
  let html='<div class="tasks-wrap">';
  open.forEach(t=>html+=taskHTML(t,showP));
  if(curProject!=='__all__')html+='<div class="add-task-row"><input type="text" class="add-task-inp" id="new-task-inp" placeholder="Neue Aufgabe…"><select class="pri-sel" id="new-task-pri"><option value="mid">Normal</option><option value="high">Hoch</option><option value="low">Niedrig</option></select><button class="add-btn" onclick="addTask(\''+curProject+'\')">+ Hinzufügen</button></div>';
  if(done.length){html+='<div class="done-div"><hr><span>Erledigt ('+done.length+')</span><hr></div>';done.forEach(t=>html+=taskHTML(t,showP));}
  html+='</div>';area.innerHTML=html;attachListeners();autoResizeAll();
  document.getElementById('new-task-inp')?.addEventListener('keydown',e=>{if(e.key==='Enter')addTask(curProject);});
}
const PLABELS={high:'Hoch',mid:'Normal',low:'Niedrig'},PCLASS={high:'p-high',mid:'p-mid',low:'p-low'};
function taskHTML(t,showP){
  return '<div class="task-item '+(t.done?'done':'')+'" data-task-id="'+t.id+'" data-project-id="'+t.projectId+'">'+
    '<div class="task-check" onclick="toggleTask(\''+t.projectId+'\',\''+t.id+'\')"><span class="task-check-icon">&#x2713;</span></div>'+
    (showP&&t._pName?'<span class="task-ptag" style="color:'+t._pColor+';background:'+t._pColor+'18">'+esc(t._pName)+'</span>':'')+
    '<textarea class="task-text" placeholder="Aufgabe…" '+(t.done?'readonly':'')+'>'+esc(t.text)+'</textarea>'+
    '<div class="task-right"><span class="pri-badge '+(PCLASS[t.priority]||'p-mid')+'">'+(PLABELS[t.priority]||'Normal')+'</span><button class="task-del" onclick="delTask(\''+t.projectId+'\',\''+t.id+'\')">&#x2715;</button></div>'+
    '</div>';
}
function addTask(pid){const i=document.getElementById('new-task-inp'),p=document.getElementById('new-task-pri').value,t=i.value.trim();if(!t)return;if(!state.tasks[pid])state.tasks[pid]=[];state.tasks[pid].unshift({id:'t_'+Date.now(),projectId:pid,text:t,priority:p,done:false,created:Date.now()});save();renderContent();renderSidebar();}
function toggleTask(pid,tid){const t=(state.tasks[pid]||[]).find(t=>t.id===tid);if(t){t.done=!t.done;save();renderContent();renderSidebar();}}
async function delTask(pid,tid){const ok=await dialog('Aufgabe löschen','Diese Aufgabe wirklich löschen?','Löschen');if(!ok)return;state.tasks[pid]=(state.tasks[pid]||[]).filter(t=>t.id!==tid);save();renderContent();renderSidebar();}

// ── SNIPPETS ──
function renderSnippets(area){
  const projects=curProject==='__all__'?state.projects:state.projects.filter(p=>p.id===curProject);
  if(projects.every(p=>!(state.snippets[p.id]||[]).length)&&curProject==='__all__'){area.innerHTML='<div class="empty"><div class="icon">{ }</div><p>Noch keine Snippets.<br>Wähle ein Projekt und speichere deinen ersten Code-Schnipsel.</p></div>';return;}
  let html='<div class="snip-grid">';
  projects.forEach(p=>(state.snippets[p.id]||[]).forEach(s=>html+=snippetHTML(s,projects.length>1?{name:p.name,color:p.color}:null)));
  if(curProject!=='__all__')html+='<div class="add-card" onclick="addSnippet(\''+curProject+'\')"><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Neues Snippet</div>';
  html+='</div>';area.innerHTML=html;attachListeners();autoResizeAll();
}
function snippetHTML(s,project){
  const lo=LANGS.map(l=>'<option value="'+l+'" '+(s.lang===l?'selected':'')+'>'+l+'</option>').join('');
  return '<div class="snip-card" data-snippet-id="'+s.id+'" data-project-id="'+s.projectId+'">'+
    '<div class="snip-header"><input class="snip-title" data-field="title" value="'+esc(s.title)+'" placeholder="Snippet benennen…" maxlength="60"><select class="snip-lang" data-field="lang">'+lo+'</select><button class="snip-copy" onclick="copySnippet(\''+s.id+'\',\''+s.projectId+'\')">Kopieren</button><button class="snip-del" onclick="delSnippet(\''+s.projectId+'\',\''+s.id+'\')">&#x2715;</button></div>'+
    '<textarea class="snip-code" data-field="code" placeholder="// Code hier einfügen…" spellcheck="false">'+esc(s.code)+'</textarea>'+
    (project?'<div class="snip-foot"><span class="snip-ptag" style="color:'+project.color+'">'+esc(project.name)+'</span></div>':'')+
    '</div>';
}
function addSnippet(pid){const id='s_'+Date.now();if(!state.snippets[pid])state.snippets[pid]=[];state.snippets[pid].unshift({id,projectId:pid,title:'',code:'',lang:'JS',created:Date.now()});save();renderContent();setTimeout(()=>{document.querySelector('[data-snippet-id="'+id+'"] .snip-title')?.focus();autoResizeAll();},50);}
async function delSnippet(pid,sid){const ok=await dialog('Snippet löschen','Dieses Snippet wirklich löschen?','Löschen');if(!ok)return;state.snippets[pid]=(state.snippets[pid]||[]).filter(s=>s.id!==sid);save();renderContent();}
function copySnippet(sid,pid){const s=(state.snippets[pid]||[]).find(x=>x.id===sid);if(!s)return;navigator.clipboard.writeText(s.code).then(()=>{const btn=document.querySelector('[data-snippet-id="'+sid+'"] .snip-copy');if(btn){btn.textContent='Kopiert!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Kopieren';btn.classList.remove('copied');},1800);}});}

// ── FILES ──
function renderFiles(area){
  if(curProject==='__all__'){
    area.innerHTML='<div class="empty"><div class="icon">&#128193;</div><p>Wähle ein Projekt aus, um Dateien &amp; Links zu sehen.</p></div>';return;
  }
  const files=(state.files[curProject]||[]);
  const links=files.filter(f=>f.type==='link');
  const paths=files.filter(f=>f.type==='path');
  const uploads=files.filter(f=>f.type==='upload');
  let html='<div class="files-wrap">';

  html+='<div class="files-section-title">Web-Links</div>';
  if(links.length)links.forEach(f=>html+=fileItemHTML(f,curProject));
  else html+='<div style="font-size:12.5px;color:var(--text3);padding:6px 0 2px">Noch keine Web-Links.</div>';

  html+='<div class="files-section-title">Pfad-Shortcuts</div>';
  if(paths.length)paths.forEach(f=>html+=fileItemHTML(f,curProject));
  else html+='<div style="font-size:12.5px;color:var(--text3);padding:6px 0 2px">Noch keine Pfad-Shortcuts.</div>';

  html+='<div class="files-section-title">Hochgeladene Dateien</div>';
  if(uploads.length)uploads.forEach(f=>html+=fileItemHTML(f,curProject));
  else html+='<div style="font-size:12.5px;color:var(--text3);padding:6px 0 2px">Noch keine hochgeladenen Dateien.</div>';

  html+='<div class="files-add-row"><button class="files-upload-btn" onclick="openFileModal(\''+curProject+'\')"><svg width="11" height="11" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Hinzufügen</button></div>';
  html+='</div>';
  area.innerHTML=html;
  attachListeners();
}

function fileItemHTML(f,pid){
  const ICONS={
    link:'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8 2H3a1 1 0 00-1 1v8a1 1 0 001 1h8a1 1 0 001-1V6M10 1h3v3M6 8l7-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    path:'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 4a1 1 0 011-1h3l1.5 2H12a1 1 0 011 1v5a1 1 0 01-1 1H2a1 1 0 01-1-1V4z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    upload:'<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8 1H3a1 1 0 00-1 1v10a1 1 0 001 1h8a1 1 0 001-1V6L8 1z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 1v5h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'
  };
  const COLORS={link:'link',path:'link',upload:'file'};
  const sub={
    link: f.url,
    path: f.path||f.url,
    upload: f.filename+(f.data?' \u00b7 gespeichert':'')
  }[f.type]||'';
  let actionBtn='';
  if(f.type==='link'){
    actionBtn='<button class="file-open-btn" onclick="window.open(\''+esc(f.url)+'\',\'_blank\')">Öffnen</button>';
  } else if(f.type==='path'){
    actionBtn='<button class="file-open-btn file-path-btn" data-url="'+esc(f.url)+'" data-path="'+esc(f.path||'')+'">Öffnen</button>';
  } else if(f.type==='upload'){
    actionBtn='<button class="file-open-btn file-dl-btn" data-fid="'+f.id+'" data-pid="'+pid+'" data-filename="'+esc(f.filename)+'">Herunterladen</button>';
  }
  return '<div class="file-item">'+
    '<div class="file-icon '+(COLORS[f.type]||'file')+'">'+(ICONS[f.type]||ICONS.upload)+'</div>'+
    '<div class="file-info"><div class="file-name">'+esc(f.title)+'</div><div class="file-sub">'+esc(sub)+'</div></div>'+
    '<div class="file-actions">'+actionBtn+
      '<button class="file-del-btn" onclick="delFile(\''+pid+'\',\''+f.id+'\')">&#x2715;</button>'+
    '</div>'+
    '</div>';
}

function formatSize(b){if(b<1024)return b+'B';if(b<1024*1024)return (b/1024).toFixed(1)+'KB';return (b/1024/1024).toFixed(1)+'MB';}
async function delFile(pid,fid){
  const ok=await dialog('Eintrag löschen','Diesen Eintrag wirklich entfernen?','Entfernen');
  if(!ok)return;
  state.files[pid]=(state.files[pid]||[]).filter(f=>f.id!==fid);save();renderContent();
}

// ── IMAGE PASTE ──
function handlePaste(e,noteCard){
  const items=e.clipboardData?.items;if(!items)return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const file=item.getAsFile();
      const reader=new FileReader();
      reader.onload=ev=>{
        const pid=noteCard.dataset.projectId,nid=noteCard.dataset.noteId;
        const note=(state.notes[pid]||[]).find(n=>n.id===nid);if(!note)return;
        if(!note.images)note.images=[];
        note.images.push(ev.target.result);save();renderContent();
      };
      reader.readAsDataURL(file);break;
    }
  }
}

// ── AUTO RESIZE ──
function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function autoResizeAll(){document.querySelectorAll('.note-body,.task-text,.snip-code').forEach(autoResize);}

// ── LISTENERS ──
function attachListeners(){
  document.querySelectorAll('.note-title,.note-body').forEach(el=>{
    el.addEventListener('input',()=>{
      const card=el.closest('.note-card');
      const note=(state.notes[card.dataset.projectId]||[]).find(n=>n.id===card.dataset.noteId);
      if(note){note[el.dataset.field]=el.value;debounceSave();}
      if(el.tagName==='TEXTAREA')autoResize(el);
    });
  });
  document.querySelectorAll('.note-card').forEach(card=>{card.addEventListener('paste',e=>handlePaste(e,card));});
  document.querySelectorAll('.task-text').forEach(el=>{
    el.addEventListener('input',()=>autoResize(el));
    el.addEventListener('change',()=>{const item=el.closest('.task-item'),task=(state.tasks[item.dataset.projectId]||[]).find(t=>t.id===item.dataset.taskId);if(task){task.text=el.value;save();}});
  });
  document.querySelectorAll('.snip-title,.snip-code,.snip-lang').forEach(el=>{
    el.addEventListener('input',()=>{const card=el.closest('.snip-card'),snip=(state.snippets[card.dataset.projectId]||[]).find(s=>s.id===card.dataset.snippetId);if(snip){snip[el.dataset.field]=el.value;debounceSave();}if(el.tagName==='TEXTAREA')autoResize(el);});
    el.addEventListener('change',()=>{const card=el.closest('.snip-card'),snip=(state.snippets[card.dataset.projectId]||[]).find(s=>s.id===card.dataset.snippetId);if(snip){snip[el.dataset.field]=el.value;save();}});
  });
  document.querySelectorAll('.snip-code').forEach(el=>{
    el.addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const s=el.selectionStart,end=el.selectionEnd;el.value=el.value.substring(0,s)+'  '+el.value.substring(end);el.selectionStart=el.selectionEnd=s+2;el.dispatchEvent(new Event('input'));}});
  });
  // Path shortcut buttons
  document.querySelectorAll('.file-path-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const url=btn.dataset.url;
      const path=btn.dataset.path||url;
      // Try to open as file:// link
      const a=document.createElement('a');
      a.href=url;a.target='_blank';a.rel='noopener';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    });
  });
  // Download buttons for uploaded files
  document.querySelectorAll('.file-dl-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pid=btn.dataset.pid,fid=btn.dataset.fid,fname=btn.dataset.filename||'datei';
      const f=(state.files[pid]||[]).find(x=>x.id===fid);
      if(!f||!f.data){alert2('Fehler','Dateidaten nicht gefunden.');return;}
      const a=document.createElement('a');
      a.href=f.data;a.download=fname;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    });
  });
}

function esc(s=''){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}

wireFileModal();
renderSidebar();
renderContent();
</script>
